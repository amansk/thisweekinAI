{% extends "base.html" %}

{% block title %}This Week in AI — Archive{% endblock %}

{% block content %}
<header>
  <h2 class="edition-title">Archive</h2>
</header>

<ul class="archive-list">
  {% for week in weeks %}
  <li>
    <a href="weeks/{{ week.date }}.html">{{ week.display }}</a>
    <span class="count">{{ week.count }} papers</span>
  </li>
  {% endfor %}
</ul>
{% endblock %}
