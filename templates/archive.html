{% extends "base.html" %}

{% block title %}This Week in AI — Archive{% endblock %}

{% block content %}
<header>
  <h1><a href="{{ root }}index.html" style="color: inherit; text-decoration: none;">This Week in AI</a></h1>
  <div class="subtitle">Archive</div>
</header>

<ul class="archive-list">
  {% for week in weeks %}
  <li>
    <a href="weeks/{{ week.date }}.html">Week of {{ week.display }}</a>
    <span class="count">{{ week.count }} papers</span>
  </li>
  {% endfor %}
</ul>
{% endblock %}
