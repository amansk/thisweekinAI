curator_notes: 'Inaugural edition — the best AI agent papers and projects from Q1 2026 (Jan 1 - Mar 8). Sources: arxiv, GitHub
  trending, lab blogs (Anthropic, OpenAI, Google DeepMind, Microsoft).'
papers:
- title: 'Wink: Recovering from Misbehaviors in Coding Agents'
  authors: []
  url: https://arxiv.org/abs/2602.17037v2
  category: agentops
  summary: 'Wink is a lightweight asynchronous self-intervention system that automatically recovers coding agents from misbehaviors
    at scale. The paper introduces a taxonomy of agent misbehaviors from production traffic analysis: Specification Drift,
    Reasoning Problems, and Tool Call Failures, occurring in ~30% of trajectories. Evaluated on 10,000+ real-world trajectories,
    Wink resolves 90% of single-intervention misbehaviors. A production A/B test showed statistically significant reductions
    in tool call failures, tokens per session, and engineer interventions.'
  importance: Production-validated system for agent error recovery with a practical misbehavior taxonomy, directly applicable
    to any deployed agent system.
  tags:
  - agent-reliability
  - error-recovery
  - production-systems
  - observability
- title: Policy Compiler for Secure Agentic Systems
  authors: []
  url: https://arxiv.org/abs/2602.16708v2
  category: agentops
  summary: PCAS provides deterministic policy enforcement for LLM-based agents by modeling system state as a dependency graph
    capturing causal relationships among tool calls, results, and messages. Policies are expressed in a Datalog-derived language
    as declarative rules accounting for transitive information flow and cross-agent provenance. A reference monitor intercepts
    all actions and blocks violations before execution, improving policy compliance from 48% to 93% across frontier models
    with zero violations in instrumented runs.
  importance: Solves the critical problem of enforceable policy compliance in multi-agent systems, moving beyond prompt-based
    guardrails to deterministic enforcement.
  tags:
  - policy-enforcement
  - guardrails
  - security
  - multi-agent
- title: 'AIR: Improving Agent Safety through Incident Response'
  authors:
  - Zibo Xiao
  - Jun Sun
  - Junjie Chen
  url: https://arxiv.org/abs/2602.11749v1
  category: agentops
  summary: Introduces the first incident response framework for LLM agent systems, defining a domain-specific language for
    managing the incident response lifecycle. AIR integrates into the agent execution loop to detect incidents via semantic
    checks, guide containment and recovery actions, and synthesize guardrail rules during eradication to block similar future
    incidents. Achieves detection, remediation, and eradication success rates all exceeding 90% across three representative
    agent types.
  importance: Fills a critical gap in agent safety by shifting from prevention-only to detection-response-recovery, directly
    applicable to production agent runtime and guardrail infrastructure.
  tags:
  - agent-safety
  - incident-response
  - guardrails
  - runtime
- title: 'Silent Egress: When Implicit Prompt Injection Makes LLM Agents Leak Without a Trace'
  authors: []
  url: https://arxiv.org/abs/2602.22450v1
  category: agentops
  summary: This paper demonstrates 'silent egress,' a prompt injection attack where adversarial instructions in URL previews
    cause LLM agents to exfiltrate sensitive runtime context via outbound requests. In 480 runs with a qwen2.5:7b agent, egress
    succeeded 89% of the time with 95% evading output-based safety checks. The authors introduce sharded exfiltration to further
    evade detection and show that network-layer defenses like domain allowlisting are far more effective than prompt-level
    mitigations.
  importance: Directly relevant to agent security architecture, demonstrating that runtime guardrails and network egress controls
    are essential for safe agentic deployments.
  tags:
  - agent-security
  - prompt-injection
  - guardrails
  - data-exfiltration
- title: 'Adversarial Intent is a Latent Variable: Stateful Trust Inference for Securing Multimodal Agentic RAG'
  authors: []
  url: https://arxiv.org/abs/2602.21447v1
  category: agentops
  summary: MMA-RAG^T formulates agentic RAG security as a POMDP where adversarial intent is a latent variable inferred across
    retrieval, planning, and generation stages. The Modular Trust Agent maintains belief states via structured LLM reasoning,
    enforcing stateful defense-in-depth as a model-agnostic overlay. Evaluated on 43,774 instances, it achieves a 6.5x reduction
    in attack success rate with negligible utility cost. Factorial ablation validates that statefulness and spatial coverage
    are both individually necessary.
  importance: Provides a rigorous guardrails framework for agentic RAG systems, directly relevant to securing agent pipelines
    in production environments.
  tags:
  - security
  - guardrails
  - agentic-RAG
  - adversarial-defense
- title: 'MAS-FIRE: Fault Injection and Reliability Evaluation for LLM-Based Multi-Agent Systems'
  authors: []
  url: https://arxiv.org/abs/2602.19843v1
  category: agentops
  summary: MAS-FIRE provides a systematic framework for fault injection and reliability evaluation of multi-agent systems,
    defining 15 fault types covering intra-agent cognitive errors and inter-agent coordination failures. Faults are injected
    via prompt modification, response rewriting, and message routing manipulation without code changes. Testing reveals four
    tiers of fault-tolerant behaviors and shows that iterative closed-loop designs neutralize over 40% of faults that cause
    catastrophic collapse in linear workflows. Stronger models do not uniformly improve robustness.
  importance: Provides essential observability and testing infrastructure for multi-agent systems, directly addressing reliability
    concerns for production agent deployments.
  tags:
  - fault-injection
  - reliability
  - multi-agent
  - observability
- title: 'TabAgent: A Framework for Replacing Agentic Generative Components with Tabular-Textual Classifiers'
  authors: []
  url: https://arxiv.org/abs/2602.16429v1
  category: agentops
  summary: TabAgent replaces expensive generative LLM calls in agentic decision tasks (routing, gating, verification) with
    lightweight tabular-textual classifiers trained on execution traces. The framework extracts structured features from trajectories,
    augments with synthetic supervision, and scores candidates with a compact classifier. On the AppWorld benchmark, it maintains
    task success while reducing latency by 95% and inference cost by 85-91%.
  importance: Directly addresses agent runtime efficiency, offering a production-ready pattern for optimizing agentic systems
    by replacing generative bottlenecks with learned discriminative models.
  tags:
  - agent-optimization
  - latency-reduction
  - tool-routing
  - production-agents
- title: 'Choosing How to Remember: Adaptive Memory Structures for LLM Agents'
  authors:
  - Mingfei Lu
  - Mengjia Wu
  - Feng Liu
  - Jiawei Xu
  - Weikai Li
  url: https://arxiv.org/abs/2602.14038v1
  category: agentops
  summary: FluxMem provides a unified framework for adaptive memory organization in LLM agents, equipping them with multiple
    complementary memory structures and learning to select among them based on interaction features. It introduces a three-level
    memory hierarchy and a Beta Mixture Model-based probabilistic gate for distribution-aware memory fusion. Experiments on
    PERSONAMEM and LoCoMo benchmarks show 9.18% and 6.14% average improvements respectively.
  importance: Directly addresses agent memory architecture with adaptive structure selection, a core component of agent runtime
    systems for maintaining coherent long-horizon behavior.
  tags:
  - agent-memory
  - adaptive-memory
  - long-horizon
  - memory-hierarchy
- title: 'SideQuest: Model-Driven KV Cache Management for Long-Horizon Agentic Reasoning'
  authors: []
  url: https://arxiv.org/abs/2602.22603v2
  category: agentops
  summary: SideQuest addresses memory pressure in long-running agentic tasks by using the reasoning model itself to compress
    its KV cache, framing compression as an auxiliary task executed in parallel to avoid polluting the main reasoning trace.
    Trained with only 215 samples, SideQuest reduces peak token usage by up to 65% on agentic tasks with minimal accuracy
    degradation. It outperforms heuristic-based KV cache compression techniques for multi-hop reasoning over retrieved documents.
  importance: Directly tackles the memory bottleneck in long-horizon agent execution, a key concern for agent runtime infrastructure
    and resource management.
  tags:
  - kv-cache
  - memory-management
  - agentic-reasoning
  - runtime-optimization
- title: 'Arbor: A Framework for Reliable Navigation of Critical Conversation Flows'
  authors:
  - Luís Silva
  - Diogo Gonçalves
  - Catarina Farinha
  - Clara Matos
  - Luís Ungaro
  url: https://arxiv.org/abs/2602.14643v3
  category: agentops
  summary: Arbor decomposes decision tree navigation into node-level tasks using a DAG-based orchestration mechanism, retrieving
    only relevant edges at each step and delegating response generation separately. Evaluated across 10 foundation models
    on clinical triage conversations, it improves turn accuracy by 29.4pp, reduces latency by 57.1%, and cuts per-turn cost
    by 14.4x. The architecture-agnostic design enables smaller models to match or exceed larger ones under single-prompt baselines.
  importance: Demonstrates that architectural decomposition of agent workflows dramatically improves reliability and cost,
    directly informing orchestration patterns for production agent systems.
  tags:
  - orchestration
  - workflow-decomposition
  - healthcare
  - cost-optimization
- title: 'PrivAct: Internalizing Contextual Privacy Preservation via Multi-Agent Preference Training'
  authors:
  - Yuhan Cheng
  - Hancheng Ye
  - Hai Helen Li
  - Jingwei Sun
  - Yiran Chen
  url: https://arxiv.org/abs/2602.13840v1
  category: agentops
  summary: PrivAct internalizes contextual privacy preservation directly into LLM agent generation behavior through multi-agent
    preference training, eliminating the need for brittle external inference-time interventions. The framework embeds privacy
    preferences into each agent to enhance system-wide contextual integrity while maintaining helpfulness. It reduces leakage
    rates by up to 12.32% and demonstrates zero-shot generalization across diverse multi-agent topologies.
  importance: Addresses guardrails for agent systems by training privacy-aware behavior directly into models rather than relying
    on external filters, relevant to agent safety infrastructure.
  tags:
  - guardrails
  - privacy
  - multi-agent
  - preference-training
- title: 'MCPShield: A Security Cognition Layer for Adaptive Trust Calibration in Model Context Protocol Agents'
  authors: []
  url: https://arxiv.org/abs/2602.14281v3
  category: agentops
  summary: MCPShield is a plug-in security layer that mitigates trust misalignment between LLM agents and third-party MCP
    tool servers. It uses metadata-guided probing before invocation, constrains execution within controlled boundaries during
    runtime, and updates security cognition by reasoning over historical traces after invocation. Experiments show strong
    generalization across six MCP-based attack scenarios and six agentic LLMs, with low false positives and minimal deployment
    overhead.
  importance: Addresses a timely and critical security gap in the rapidly adopted MCP ecosystem with a practical, plug-in
    defense layer.
  tags:
  - mcp-security
  - tool-validation
  - trust-calibration
  - agent-security
- title: 'AOI: Turning Failed Trajectories into Training Signals for Autonomous Cloud Diagnosis'
  authors: []
  url: https://arxiv.org/abs/2603.03378v2
  category: agentops
  summary: AOI presents a trainable multi-agent framework for automated SRE operations that addresses data privacy, safe execution,
    and learning from failures. It uses GRPO to distill expert knowledge into local open-source models, a read-write separated
    execution architecture for safe learning, and a Failure Trajectory Closed-Loop Evolver for continual improvement. On AIOpsLab,
    AOI achieves 66.3% best@5 success, surpassing prior SOTA by 24.4 points, with a 14B model outperforming Claude Sonnet
    4.5.
  importance: Demonstrates production-ready agent operations for cloud diagnosis with safety-first architecture and failure-driven
    improvement, directly applicable to AgentCore operations.
  tags:
  - SRE-automation
  - failure-learning
  - cloud-operations
  - safe-execution
- title: 'TRACER: Trajectory Risk Aggregation for Critical Episodes in Agentic Reasoning'
  authors:
  - Sina Tayebati
  - Divake Kumar
  - Nastaran Darabi
  - Davide Ettori
  - Ranganath Krishnan
  url: https://arxiv.org/abs/2602.11409v1
  category: agentops
  summary: Introduces TRACER, a trajectory-level uncertainty metric for multi-turn tool-using agent interactions that detects
    failure-inducing episodes like looping, incoherent tool use, and user-agent miscoordination. Combines content-aware surprisal
    with situational-awareness signals, semantic repetition, and tool-grounded coherence gaps using a tail-focused risk functional.
    Improves AUROC by up to 37.1% and AUARC by up to 55% over baselines on tau2-bench. Enables earlier and more accurate detection
    of uncertainty in complex conversational tool-use settings.
  importance: Directly addresses observability gaps in agent systems by providing trajectory-level failure detection, a core
    need for production agent monitoring and runtime safety.
  tags:
  - observability
  - uncertainty
  - tool-use
  - agent-monitoring
- title: 'When Agents Disagree With Themselves: Measuring Behavioral Consistency in LLM-Based Agents'
  authors:
  - Aman Mehta
  url: https://arxiv.org/abs/2602.11619v1
  category: agentops
  summary: A study of 3,000 agent runs across three models on HotpotQA revealing that ReAct-style agents produce 2-4.2 distinct
    action sequences per 10 identical runs. Tasks with consistent behavior achieve 80-92% accuracy versus 25-60% for highly
    inconsistent tasks. The authors trace 69% of divergence to step 2, suggesting early behavioral monitoring could enable
    proactive error detection.
  importance: Directly informs agent observability and runtime monitoring strategies by showing behavioral consistency is
    a strong predictor of task success.
  tags:
  - agent-reliability
  - observability
  - behavioral-consistency
- title: 'AMV-L: Lifecycle-Managed Agent Memory for Tail-Latency Control in Long-Running LLM Systems'
  authors:
  - Emmanuel Bamidele
  url: https://arxiv.org/abs/2603.04443v1
  category: agentops
  summary: Presents AMV-L, a memory-management framework treating agent memory as a managed systems resource with value-driven
    promotion, demotion, and eviction across lifecycle tiers. Retrieval is restricted to a bounded, tier-aware candidate set
    decoupling working set from total retained memory. Achieves 3.1x throughput improvement and 4.2x median latency reduction
    over TTL baselines, reducing requests exceeding 2s from 13.8% to 0.007%.
  importance: Directly addresses agent memory management at the infrastructure level with strong latency guarantees, highly
    relevant to production agent runtime and memory systems.
  tags:
  - agent-memory
  - latency-optimization
  - memory-management
  - agent-infrastructure
- title: 'Recursive language models for jailbreak detection: a procedural defense for tool-augmented agents'
  authors:
  - Doron Shavit
  url: https://arxiv.org/abs/2602.16520v1
  category: agentops
  summary: RLM-JB is an end-to-end jailbreak detection framework that uses recursive language models to defend tool-augmented
    agents. A root model orchestrates bounded analysis programs that normalize, chunk, and screen inputs in parallel, then
    aggregate cross-chunk signals to catch split-payload attacks. On AutoDAN-style adversarial inputs it achieves 92.5-98%
    recall with 98.99-100% precision across three LLM backends.
  importance: Directly addresses guardrail design for agentic systems with tool access, offering a production-ready detection
    pipeline with strong precision-recall tradeoffs.
  tags:
  - guardrails
  - jailbreak-detection
  - agent-security
- title: 'CausalArmor: Efficient Indirect Prompt Injection Guardrails via Causal Attribution'
  authors: []
  url: https://arxiv.org/abs/2602.07918v1
  category: agentops
  summary: CausalArmor addresses indirect prompt injection attacks on tool-calling AI agents through a selective defense framework
    based on causal ablation. It computes leave-one-out attributions at privileged decision points and triggers targeted sanitization
    only when an untrusted segment dominates user intent, avoiding the over-defense dilemma. It also employs retroactive Chain-of-Thought
    masking to prevent acting on poisoned reasoning traces. Experiments on AgentDojo and DoomArena match aggressive defenses
    while preserving utility and latency.
  importance: Directly applicable as a guardrail layer for agent platforms, offering efficient, selective defense against
    prompt injection with theoretical guarantees and practical latency benefits.
  tags:
  - guardrails
  - security
  - prompt-injection
  - tool-calling
- title: 'Learning When to Act or Refuse: Guarding Agentic Reasoning Models for Safe Multi-Step Tool Use'
  authors:
  - Aradhye Agarwal
  - Gurdit Siyan
  - Yash Pandya
  - Joykirat Singh
  - Akshay Nambi
  url: https://arxiv.org/abs/2603.03205v1
  category: agentops
  summary: MOSAIC introduces a post-training framework that aligns agents for safe multi-step tool use by structuring inference
    as a plan-check-act-or-refuse loop with explicit safety reasoning and refusal as first-class actions. It uses preference-based
    reinforcement learning with pairwise trajectory comparisons to learn safety without trajectory-level labels. Evaluated
    zero-shot across three model families, MOSAIC reduces harmful behavior by up to 50% and increases refusal on injection
    attacks by over 20% while preserving benign task performance.
  importance: Directly addresses guardrails for agentic tool use with a generalizable safety framework, a core concern for
    agent runtime and session management infrastructure.
  tags:
  - agent-safety
  - guardrails
  - tool-use
  - reinforcement-learning
- title: 'When Benchmarks Lie: Evaluating Malicious Prompt Classifiers Under True Distribution Shift'
  authors:
  - Max Fomin
  url: https://arxiv.org/abs/2602.14161v1
  category: agentops
  summary: Reveals that standard train-test evaluation of prompt injection and jailbreak classifiers overestimates performance
    by up to 25% per-dataset due to distribution shift. Proposes Leave-One-Dataset-Out (LODO) evaluation across 18 datasets
    spanning harmful requests, jailbreaks, and indirect prompt injections. Finds production guardrails like PromptGuard 2
    and LlamaGuard detect only 7-37% of indirect attacks targeting agents. Uses Sparse Auto-Encoder analysis to show 28% of
    top classifier features are dataset-dependent shortcuts.
  importance: 'Critical finding for agent safety: production guardrails fail on indirect prompt injection attacks, and standard
    evaluation methods mask these failures. Essential reading for guardrail deployment.'
  tags:
  - guardrails
  - prompt-injection
  - evaluation
  - agent-safety
- title: 'Step 3.5 Flash: Open Frontier-Level Intelligence with 11B Active Parameters'
  authors:
  - Ailin Huang
  - Ang Li
  - Aobo Kong
  - Bin Wang
  - Binxing Jiao
  url: https://arxiv.org/abs/2602.10604v2
  category: models
  summary: 'Introduces Step 3.5 Flash, a 196B-parameter sparse MoE model with only 11B active parameters, optimized for efficient
    agentic inference with interleaved sliding-window attention and Multi-Token Prediction. Uses a scalable RL framework combining
    verifiable signals with preference feedback for stable self-improvement across math, code, and tool use. Achieves frontier-level
    performance: 88.2% on tau2-Bench, 86.4% on LiveCodeBench-v6, and 51.0% on Terminal-Bench 2.0. Demonstrates that efficient
    sparse models can match dense frontier models for agentic tasks.'
  importance: Open-weight model achieving frontier agentic performance at dramatically reduced compute, enabling practical
    deployment of sophisticated agents in production environments.
  tags:
  - efficient-models
  - moe
  - agentic-inference
  - open-weights
- title: 'Search-P1: Path-Centric Reward Shaping for Stable and Efficient Agentic RAG Training'
  authors: []
  url: https://arxiv.org/abs/2602.22576v1
  category: models
  summary: Search-P1 proposes path-centric reward shaping for training agentic RAG systems, addressing the sparse reward problem
    in RL-based training. It evaluates reasoning trajectory quality through order-agnostic step coverage and soft scoring
    that extracts learning signals even from failed samples. A dual-track path scoring mechanism with offline-generated reference
    planners assesses paths from self-consistency and reference-alignment perspectives. Achieves 7.7 point average accuracy
    gain over Search-R1 across QA benchmarks.
  importance: Advances the training methodology for agentic retrieval systems, making RL-based agent training more sample-efficient
    and stable.
  tags:
  - agentic-RAG
  - reward-shaping
  - reinforcement-learning
  - retrieval
- title: 'Nanbeige4.1-3B: A Small General Model that Reasons, Aligns, and Acts'
  authors:
  - Chen Yang
  - Guangyue Peng
  - Jiaying Zhu
  - Ran Le
  - Ruixiang Feng
  url: https://arxiv.org/abs/2602.13367v1
  category: models
  summary: Nanbeige4.1-3B is a 3B-parameter unified model achieving strong agentic behavior, code generation, and general
    reasoning simultaneously. It combines point-wise and pair-wise reward modeling for alignment, complexity-aware rewards
    for code generation, and turn-level supervision enabling stable execution of up to 600 tool-call turns. It significantly
    outperforms prior models at similar scale and even surpasses larger models like Qwen3-30B-A3B.
  importance: Demonstrates that small models can achieve strong agentic capabilities with 600-turn tool interactions, relevant
    for cost-efficient agent deployments.
  tags:
  - small-models
  - agentic
  - tool-calling
  - reinforcement-learning
- title: 'GLM-5: from Vibe Coding to Agentic Engineering'
  authors:
  - GLM-5-Team
  - ':'
  - Aohan Zeng
  - Xin Lv
  - Zhenyu Hou
  url: https://arxiv.org/abs/2602.15763v2
  category: models
  summary: GLM-5 is a foundation model designed for agentic engineering that uses DSA architecture for reduced training/inference
    costs and a novel asynchronous RL infrastructure that decouples generation from training. It introduces asynchronous agent
    RL algorithms for learning from complex, long-horizon interactions. The model achieves state-of-the-art on open benchmarks
    and demonstrates strong real-world coding task performance.
  importance: A competitive open foundation model specifically optimized for agentic coding workflows, with novel async RL
    training infrastructure that could influence agent model development.
  tags:
  - foundation-model
  - agentic-engineering
  - reinforcement-learning
- title: Multilingual Safety Alignment Via Sparse Weight Editing
  authors: []
  url: https://arxiv.org/abs/2602.22554v1
  category: models
  summary: This paper proposes a training-free framework for cross-lingual safety alignment by identifying sparse safety neurons
    and formulating alignment as a constrained linear transformation. It maps harmful representations from low-resource languages
    to robust safety subspaces of high-resource languages while preserving utility via null-space projection. Experiments
    across 8 languages on Llama-3 and Qwen-2.5 show substantial reduction in attack success rates with negligible impact on
    reasoning.
  importance: Offers a computationally efficient, data-light approach to extending safety guardrails across languages without
    retraining.
  tags:
  - safety
  - multilingual
  - weight-editing
  - guardrails
- title: 'CoRefine: Confidence-Guided Self-Refinement for Adaptive Test-Time Compute'
  authors: []
  url: https://arxiv.org/abs/2602.08948v1
  category: models
  summary: Introduces CoRefine, a confidence-guided self-refinement method that uses a lightweight 211k-parameter controller
    atop a frozen LLM to decide whether to halt, re-examine, or try a different reasoning approach. Achieves competitive accuracy
    with ~190x token reduction compared to 512-sample baselines. The controller reaches 92.6% precision on confident halts
    across diverse reasoning benchmarks. CoRefine-Tree extends this to a hybrid sequential-parallel variant for adaptive exploration.
  importance: Offers a practical, modular primitive for scalable reasoning that dramatically reduces compute costs, directly
    applicable to agent runtime optimization.
  tags:
  - test-time-compute
  - self-refinement
  - reasoning
  - efficiency
- title: 'DySCO: Dynamic Attention-Scaling Decoding for Long-Context LMs'
  authors: []
  url: https://arxiv.org/abs/2602.22175v1
  category: models
  summary: DySCO is a training-free decoding algorithm that leverages retrieval heads to identify task-relevant tokens at
    each step and dynamically up-weights them for improved long-context reasoning. Applicable to any off-the-shelf LM, it
    yields up to 25% relative gains on MRCR and LongBenchV2 at 128K context length with modest compute overhead. Analysis
    highlights the importance of both dynamic rescaling and retrieval-head-guided selection.
  importance: A practical, drop-in improvement for long-context reasoning that requires no retraining, directly useful for
    agent systems processing long sessions.
  tags:
  - long-context
  - decoding
  - attention
  - inference
- title: 'ARKV: Adaptive and Resource-Efficient KV Cache Management under Limited Memory Budget for Long-Context Inference
    in LLMs'
  authors: []
  url: https://arxiv.org/abs/2603.08727v1
  category: models
  summary: ARKV dynamically allocates precision levels to cached tokens based on per-layer attention dynamics and token importance.
    During prefill it estimates quantization ratios via attention statistics; during decoding tokens are assigned to Original,
    Quantization, or Eviction states via heavy-hitter scoring. On LLaMA3 and Qwen3, it preserves ~97% baseline accuracy on
    long-context benchmarks while reducing KV memory by 4x with minimal throughput loss.
  importance: Enables practical long-context LLM deployment for agentic workflows by drastically reducing memory requirements
    without retraining or architecture changes.
  tags:
  - kv-cache
  - memory-efficiency
  - long-context
  - inference
- title: 'Hit-RAG: Learning to Reason with Long Contexts via Preference Alignment'
  authors: []
  url: https://arxiv.org/abs/2603.07023v1
  category: models
  summary: Hit-RAG addresses attention dilution and reasoning hallucinations in long-context RAG through a multi-stage preference
    alignment framework. It progresses through supervised fine-tuning for baseline context awareness, discriminative preference
    alignment for distractor robustness, and group-relative policy optimization to prevent reasoning collapse. Evaluations
    across eight benchmarks show substantial gains, enabling smaller models to surpass larger counterparts in long-context
    scenarios.
  importance: Provides a practical training pipeline to improve RAG quality in long-context scenarios, directly applicable
    to retrieval-augmented agent systems.
  tags:
  - rag
  - long-context
  - preference-alignment
  - reasoning
- title: '$V_1$: Unifying Generation and Self-Verification for Parallel Reasoners'
  authors: []
  url: https://arxiv.org/abs/2603.04304v1
  category: models
  summary: V1 introduces a framework unifying generation and verification through efficient pairwise ranking for test-time
    scaling. V1-Infer uses uncertainty-guided tournament-based ranking to allocate self-verification compute dynamically,
    while V1-PairRL jointly trains a model as both generator and pairwise verifier. On code generation and math reasoning
    benchmarks, the approach improves Pass@1 by up to 10% over pointwise verification while being significantly more efficient.
  importance: Advances test-time scaling with a practical pairwise verification approach that jointly improves generation
    and verification quality.
  tags:
  - test-time-scaling
  - verification
  - code-generation
- title: 'CAMEL: Confidence-Gated Reflection for Reward Modeling'
  authors: []
  url: https://arxiv.org/abs/2602.20670v1
  category: models
  summary: CAMEL proposes a confidence-gated reflection framework for reward models that performs a lightweight single-token
    preference decision first and selectively invokes reflection only for low-confidence instances. Trained via RL with counterfactual
    prefix augmentation, the 14B model achieves 82.9% average accuracy on reward-model benchmarks, surpassing 70B-parameter
    models. The approach establishes a better accuracy-efficiency Pareto frontier for RLHF reward modeling.
  importance: Advances efficient reward modeling with a practical confidence-gating mechanism that balances compute cost with
    accuracy, relevant to LLM alignment pipelines.
  tags:
  - reward-modeling
  - rlhf
  - efficiency
  - reflection
- title: 'Learning from the Irrecoverable: Error-Localized Policy Optimization for Tool-Integrated LLM Reasoning'
  authors:
  - Qiao Liang
  - Yuke Zhu
  - Chao Ge
  - Lei Yang
  - Ying Shen
  url: https://arxiv.org/abs/2602.09598v1
  category: models
  summary: ELPO addresses sparse reward and weak credit assignment in tool-integrated reasoning by localizing the first irrecoverable
    step via binary-search rollout trees. It converts these into learning signals through hierarchical advantage attribution
    and applies error-localized adaptive clipping for corrective updates. ELPO consistently outperforms agentic RL baselines
    across math, science QA, and code execution benchmarks with improved Pass@K scaling and tool-call efficiency.
  importance: Provides a principled method for fine-grained credit assignment in agentic RL, improving tool-use training efficiency
    which is fundamental to building better agents.
  tags:
  - agentic-rl
  - credit-assignment
  - tool-integrated-reasoning
  - policy-optimization
- title: 'Alignment-Weighted DPO: A principled reasoning approach to improve safety alignment'
  authors: []
  url: https://arxiv.org/abs/2602.21346v1
  category: models
  summary: This paper identifies that LLM safety alignment vulnerabilities stem from shallow mechanisms lacking deep reasoning.
    It proposes reasoning-aware post-training with a Chain-of-Thought fine-tuning dataset containing step-by-step safety rationales,
    and introduces Alignment-Weighted DPO that assigns different preference weights to reasoning versus answer segments. This
    targeted approach improves robustness against diverse jailbreak strategies while maintaining model utility.
  importance: Addresses a root cause of jailbreak vulnerabilities by grounding safety refusals in explicit reasoning rather
    than pattern matching.
  tags:
  - safety-alignment
  - dpo
  - chain-of-thought
  - jailbreak-defense
- title: Leveraging LLM Parametric Knowledge for Fact Checking without Retrieval
  authors: []
  url: https://arxiv.org/abs/2603.05471v1
  category: models
  summary: This paper proposes fact-checking without retrieval by leveraging LLM internal representations rather than external
    knowledge sources. INTRA, the proposed method, exploits interactions between internal representations and achieves state-of-the-art
    performance across 9 datasets, 18 methods, and 3 models. Testing covers long-tail knowledge, claim source variation, multilinguality,
    and long-form generation, showing logit-based approaches underperform representation-based ones.
  importance: Establishes retrieval-free fact-checking as a viable complement to RAG-based verification, useful as guardrail
    components in agent pipelines.
  tags:
  - fact-checking
  - hallucination-detection
  - model-internals
  - guardrails
- title: Privileged Information Distillation for Language Models
  authors: []
  url: https://arxiv.org/abs/2602.04942v3
  category: models
  summary: Introduces pi-Distill and On-Policy Self-Distillation (OPSD) for distilling frontier agent models when only action
    trajectories (not reasoning traces) are available. pi-Distill jointly trains a privileged-information-conditioned teacher
    and an unconditioned student using the same model. Both methods outperform standard SFT+RL pipelines that assume full
    chain-of-thought access across multiple agentic benchmarks. Provides extensive analysis of factors enabling effective
    learning with privileged information.
  importance: Solves a practical problem in agent model distillation where frontier model reasoning is hidden, enabling more
    effective training of smaller agent models.
  tags:
  - distillation
  - reinforcement-learning
  - agentic
  - training
- title: Evaluating Chain-of-Thought Reasoning through Reusability and Verifiability
  authors:
  - Shashank Aggarwal
  - Ram Vikas Mishra
  - Amit Awekar
  url: https://arxiv.org/abs/2602.17544v1
  category: models
  summary: Introduces reusability and verifiability as novel evaluation measures for chain-of-thought reasoning, decoupling
    CoT generation from execution using a Thinker-Executor framework. Evaluates four Thinker models against ten Executor models
    across five benchmarks. Reveals that reusability and verifiability do not correlate with standard accuracy, and specialized
    reasoning models are not consistently more reusable than general-purpose LLMs.
  importance: Exposes a blind spot in accuracy-based reasoning leaderboards and introduces metrics relevant to multi-agent
    systems where reasoning traces are shared between components.
  tags:
  - chain-of-thought
  - evaluation
  - multi-agent-reasoning
- title: 'Beyond Length Scaling: Synergizing Breadth and Depth for Generative Reward Models'
  authors: []
  url: https://arxiv.org/abs/2603.01571v1
  category: models
  summary: 'Mix-GRM introduces a framework that structures Chain-of-Thought reasoning into Breadth-CoT (multi-dimensional
    principle coverage) and Depth-CoT (substantive judgment soundness) for generative reward models. Using SFT and RLVR, the
    model achieves SOTA across five benchmarks, surpassing open-source RMs by 8.2%. Key finding: RLVR acts as a switching
    amplifier, enabling emergent polarization where models spontaneously match reasoning style to task demands.'
  importance: Advances reward model design with structured reasoning decomposition, important for improving agent evaluation
    and self-improvement pipelines.
  tags:
  - reward-models
  - chain-of-thought
  - RLVR
  - evaluation
- title: 'PyVision-RL: Forging Open Agentic Vision Models via RL'
  authors: []
  url: https://arxiv.org/abs/2602.20739v1
  category: models
  summary: PyVision-RL addresses interaction collapse in RL-trained agentic multimodal models, where models learn to avoid
    tool use and multi-turn reasoning. It introduces an oversampling-filtering-ranking rollout strategy with accumulative
    tool rewards to sustain interaction. PyVision-Video uses on-demand context construction, selectively sampling task-relevant
    frames during reasoning to reduce visual token usage while maintaining strong performance.
  importance: Solves a fundamental RL training failure mode for agentic models, ensuring sustained tool use and multi-turn
    interaction critical for agent runtime behavior.
  tags:
  - reinforcement-learning
  - multimodal
  - tool-use
  - agentic-models
- title: Experiential Reinforcement Learning
  authors:
  - Taiwei Shi
  - Sihao Chen
  - Bowen Jiang
  - Linxin Song
  - Longqi Yang
  url: https://arxiv.org/abs/2602.13949v1
  category: models
  summary: ERL embeds an experience-reflection-consolidation loop into reinforcement learning for language models. The model
    generates an attempt, receives feedback, produces a reflection guiding a refined second attempt, and the successful revision
    is reinforced into the base policy. This achieves up to 81% gains in complex multi-step environments and 11% in tool-using
    reasoning tasks without additional inference cost at deployment.
  importance: A training paradigm that internalizes reflection into model weights, improving agentic task performance without
    inference-time overhead.
  tags:
  - reinforcement-learning
  - self-reflection
  - training-paradigm
- title: Self-Improving World Modelling with Latent Actions
  authors: []
  url: https://arxiv.org/abs/2602.06130v2
  category: models
  summary: SWIRL proposes a self-improvement framework for world models that learns from state-only sequences by treating
    actions as latent variables, alternating between forward world modelling and inverse dynamics modelling. Both models are
    trained with GRPO reinforcement learning using the opposite model's log-probability as reward. The approach achieves gains
    of 16-28% across multiple benchmarks including visual dynamics and tool-calling environments.
  importance: Demonstrates that world models can self-improve without action labels, with direct implications for building
    agent planning and tool-use capabilities from unlabeled trajectories.
  tags:
  - world-models
  - self-improvement
  - planning
- title: 'CORPGEN: Simulating Corporate Environments with Autonomous Digital Employees in Multi-Horizon Task Environments'
  authors:
  - Abubakarr Jaye
  - Nigel Boachie Kumankumah
  - Chidera Biringa
  - Anjel Shaileshbhai Patel
  - Sulaiman Vesal
  url: https://arxiv.org/abs/2602.14229v1
  category: agents
  summary: 'CORPGEN introduces Multi-Horizon Task Environments requiring agents to manage 45+ interleaved tasks over 500-1500+
    steps, identifying four failure modes: context saturation, memory interference, dependency complexity, and reprioritization
    overhead. The framework addresses these via hierarchical planning, sub-agent isolation, tiered memory (working, structured,
    semantic), and adaptive summarization. Across three CUA backends, it achieves up to 3.5x improvement over baselines with
    stable performance under increasing load.'
  importance: Directly addresses agent runtime challenges including memory management, session isolation, and long-horizon
    orchestration that are core concerns for production agent infrastructure.
  tags:
  - multi-horizon-tasks
  - agent-memory
  - session-management
  - hierarchical-planning
- title: 'LAPIS: Lightweight API Specification for Intelligent Systems'
  authors: []
  url: https://arxiv.org/abs/2602.18541v1
  category: agents
  summary: LAPIS introduces a domain-specific API specification format optimized for LLM consumption, achieving 85-89% token
    reduction compared to OpenAPI while preserving semantic information needed for API reasoning. Tested against five production
    APIs including GitHub and Twilio, it introduces centralized error definitions, rate limit descriptions, and operation
    flow declarations. The format is auto-convertible from OpenAPI 3.x and released as open specification.
  importance: Highly practical for agent tool orchestration, directly reducing context window costs and improving tool-use
    accuracy for LLM agents interacting with APIs.
  tags:
  - api-specification
  - tool-use
  - token-efficiency
  - agent-tooling
- title: 'Memex(RL): Scaling Long-Horizon LLM Agents via Indexed Experience Memory'
  authors: []
  url: https://arxiv.org/abs/2603.04257v1
  category: agents
  summary: Memex introduces an indexed experience memory mechanism that compresses agent context without discarding evidence,
    maintaining compact working context with structured summaries and stable indices while storing full interactions in an
    external database. The agent learns via MemexRL when to dereference indices to recover exact past evidence. Theoretical
    analysis shows the approach preserves decision quality with bounded dereferencing, and empirical results demonstrate improved
    task success with significantly smaller working context on long-horizon tasks.
  importance: Directly addresses the context window bottleneck for long-horizon agents with a principled memory architecture
    highly relevant to agent runtime infrastructure.
  tags:
  - agent-memory
  - context-management
  - reinforcement-learning
  - long-horizon
- title: 'ActionEngine: From Reactive to Programmatic GUI Agents via State Machine Memory'
  authors: []
  url: https://arxiv.org/abs/2602.20502v1
  category: agents
  summary: 'ActionEngine introduces a two-agent architecture for GUI automation: a Crawling Agent builds an updatable state-machine
    memory of interfaces through offline exploration, while an Execution Agent synthesizes complete Python programs for task
    execution using this memory. A vision-based re-grounding fallback handles interface changes by repairing failed actions
    and updating memory. On Reddit tasks from WebArena, it achieves 95% success with a single LLM call on average, reducing
    cost by 11.8x versus vision-only baselines.'
  importance: Demonstrates a paradigm shift from reactive to programmatic GUI agents with persistent memory, dramatically
    improving efficiency and reliability.
  tags:
  - gui-agents
  - state-machine
  - memory
  - programmatic-planning
- title: 'W&D: Scaling Parallel Tool Calling for Efficient Deep Research Agents'
  authors:
  - Xiaoqiang Lin
  - Jun Hao Liew
  - Silvio Savarese
  - Junnan Li
  url: https://arxiv.org/abs/2602.07359v1
  category: agents
  summary: Proposes the Wide and Deep research agent framework that scales agent performance by parallelizing tool calls within
    single reasoning steps, rather than relying on complex multi-agent orchestration. Demonstrates that scaling width significantly
    improves deep research benchmarks while reducing required turns. Achieves 62.2% accuracy on BrowseComp with GPT-5-Medium,
    surpassing the 54.9% reported by GPT-5-High.
  importance: Shows that parallel tool calling is a practical, underexplored dimension for scaling agent performance, achieving
    better results than costlier sequential deep reasoning.
  tags:
  - parallel-tool-calling
  - deep-research
  - agent-efficiency
  - scaling
- title: 'ASA: Training-Free Representation Engineering for Tool-Calling Agents'
  authors: []
  url: https://arxiv.org/abs/2602.04935v2
  category: agents
  summary: ASA identifies a 'Lazy Agent' failure mode where LLMs can internally detect tool necessity but fail to act on it,
    revealing a representation-behavior gap. It proposes Activation Steering Adapter, a training-free inference-time controller
    that uses mid-layer interventions with router-conditioned steering vectors to improve tool-calling reliability. On MTU-Bench
    with Qwen2.5-1.5B, it improves strict tool-use F1 from 0.18 to 0.50 while reducing false positives, using only ~20KB of
    portable assets.
  importance: Offers a lightweight, training-free method to dramatically improve tool-calling reliability in LLM agents, directly
    relevant to production tool orchestration systems.
  tags:
  - tool-calling
  - activation-steering
  - inference-optimization
  - representation-engineering
- title: Memory for Autonomous LLM Agents:Mechanisms, Evaluation, and Emerging Frontiers
  authors:
  - Pengfei Du
  url: https://arxiv.org/abs/2603.07670v1
  category: agents
  summary: This survey formalizes agent memory as a write-manage-read loop and introduces a three-dimensional taxonomy spanning
    temporal scope, representational substrate, and control policy. It examines five mechanism families including context-resident
    compression, retrieval-augmented stores, and hierarchical virtual context. The paper covers evaluation benchmarks, applications
    from coding agents to multi-agent teamwork, and engineering realities like latency budgets and privacy governance.
  importance: Comprehensive reference for anyone building memory systems for LLM agents, directly relevant to session management
    and memory orchestration in production agent platforms.
  tags:
  - agent-memory
  - survey
  - retrieval-augmented
  - multi-session
- title: 'REMem: Reasoning with Episodic Memory in Language Agent'
  authors: []
  url: https://arxiv.org/abs/2602.13530v3
  category: agents
  summary: REMem introduces a two-phase framework for constructing and reasoning with episodic memory in language agents.
    Offline indexing converts experiences into a hybrid memory graph linking time-aware gists and facts, while online inference
    employs an agentic retriever with curated tools for iterative retrieval. It outperforms state-of-the-art memory systems
    like Mem0 and HippoRAG 2 by 3.4% on recollection and 13.4% on reasoning tasks, with improved refusal behavior for unanswerable
    questions.
  importance: Advances agent memory beyond semantic storage to structured episodic reasoning, a key capability for long-running
    autonomous agents.
  tags:
  - episodic-memory
  - agent-memory
  - reasoning
  - retrieval
- title: 'Machine Learning as a Tool (MLAT): A Framework for Integrating Statistical ML Models as Callable Tools within LLM
    Agent Workflows'
  authors:
  - Edwin Chen
  - Zulekha Bibi
  url: https://arxiv.org/abs/2602.14295v1
  category: agents
  summary: MLAT formalizes a design pattern where pre-trained ML models are exposed as callable tools within LLM agent workflows,
    allowing the orchestrating agent to invoke quantitative predictions contextually. The pilot system PitchCraft uses a Research
    Agent and Draft Agent with an XGBoost pricing model as a tool call to generate proposals in under 10 minutes. The pricing
    model achieves R^2=0.807 trained on only 70 examples combining real and synthetic data.
  importance: Establishes a practical pattern for integrating traditional ML models as first-class tools in agent workflows,
    directly applicable to tool orchestration in agent platforms.
  tags:
  - tool-orchestration
  - ml-integration
  - agent-workflows
  - structured-output
- title: 'ToolSelf: Unifying Task Execution and Self-Reconfiguration via Tool-Driven Intrinsic Adaptation'
  authors: []
  url: https://arxiv.org/abs/2602.07883v2
  category: agents
  summary: Proposes ToolSelf, a paradigm where agents reconfigure themselves at runtime by treating configuration updates
    as callable tools. This unifies task execution and self-adjustment into a single action space, enabling agents to autonomously
    update sub-goals, context, strategy, and toolbox based on task progression. Configuration-Aware Two-stage Training combines
    rejection sampling fine-tuning with trajectory-level RL. Achieves 24.1% average performance gain across diverse benchmarks.
  importance: Introduces a compelling architecture for self-adaptive agents that merges orchestration and execution, directly
    informing agent runtime and tool orchestration design patterns.
  tags:
  - self-adaptive-agents
  - tool-orchestration
  - runtime-reconfiguration
- title: 'KARL: Knowledge Agents via Reinforcement Learning'
  authors: []
  url: https://arxiv.org/abs/2603.05218v1
  category: agents
  summary: KARL trains enterprise search agents via reinforcement learning, introducing KARLBench spanning six search regimes
    including constraint-driven entity search, cross-document synthesis, and tabular reasoning. It shows that training across
    heterogeneous search behaviors yields better generalization than single-benchmark optimization. An agentic synthesis pipeline
    generates diverse training data, and iterative large-batch off-policy RL enables sample-efficient multi-task training.
    KARL is Pareto-optimal versus Claude 4.6 and GPT 5.2 on cost-quality and latency-quality tradeoffs.
  importance: Demonstrates that RL-trained search agents can surpass frontier models on enterprise knowledge tasks, with a
    practical multi-task training paradigm.
  tags:
  - enterprise-search
  - reinforcement-learning
  - knowledge-agents
  - benchmark
- title: 'Beyond Refusal: Probing the Limits of Agentic Self-Correction for Semantic Sensitive Information'
  authors: []
  url: https://arxiv.org/abs/2602.21496v1
  category: agents
  summary: This paper introduces SemSIEdit, an inference-time framework where an agentic 'Editor' iteratively rewrites sensitive
    content to preserve utility rather than refusing outright. The approach reduces semantic sensitive information leakage
    by 34.6% with only 9.8% utility loss. The study reveals a Scale-Dependent Safety Divergence where large reasoning models
    add nuance while smaller ones destructively truncate, and a Reasoning Paradox where deeper inference both increases risk
    and enables better defenses.
  importance: Provides practical guardrail patterns for agent safety, showing constructive rewriting outperforms refusal for
    sensitive content handling in production systems.
  tags:
  - guardrails
  - safety
  - privacy
  - agentic-self-correction
- title: 'AriadneMem: Threading the Maze of Lifelong Memory for LLM Agents'
  authors: []
  url: https://arxiv.org/abs/2603.03290v1
  category: agents
  summary: Proposes AriadneMem, a structured memory system for long-horizon LLM agents that addresses disconnected evidence
    and state updates. An offline phase uses entropy-aware gating and conflict-aware coarsening to build a memory graph, while
    the online phase performs algorithmic bridge discovery and single-call topology-aware synthesis. Achieves 15.2% Multi-Hop
    F1 improvement and 77.8% runtime reduction using only 497 context tokens on LoCoMo benchmarks.
  importance: Demonstrates a highly efficient agent memory architecture with dramatic runtime and context savings, directly
    applicable to agent memory and session management infrastructure.
  tags:
  - agent-memory
  - graph-memory
  - context-efficiency
- title: 'VimRAG: Navigating Massive Visual Context in Retrieval-Augmented Generation via Multimodal Memory Graph'
  authors:
  - Qiuchen Wang
  - Shihang Wang
  - Yu Zeng
  - Qiang Zhang
  - Fanrui Zhang
  url: https://arxiv.org/abs/2602.12735v1
  category: agents
  summary: VimRAG models the multimodal reasoning process as a dynamic directed acyclic graph structuring agent states and
    retrieved evidence across text, images, and video. It introduces Graph-Modulated Visual Memory Encoding to allocate high-resolution
    tokens to pivotal evidence while compressing trivial clues based on topological position. A Graph-Guided Policy Optimization
    strategy enables fine-grained credit assignment by pruning redundant memory nodes.
  importance: Advances structured memory and retrieval for multimodal agents, with graph-based memory management patterns
    applicable to agent runtime memory systems.
  tags:
  - multimodal-rag
  - memory-graph
  - visual-reasoning
  - agent-memory
- title: 'DenoiseFlow: Uncertainty-Aware Denoising for Reliable LLM Agentic Workflows'
  authors:
  - Yandong Yan
  - Junwei Peng
  - Shijie Li
  - Chenxi Li
  - Yifei Shang
  url: https://arxiv.org/abs/2603.00532v1
  category: agents
  summary: 'DenoiseFlow formalizes multi-step agent reasoning as a Noisy MDP and proposes a closed-loop framework with three
    stages: Sensing estimates per-step semantic uncertainty, Regulating adaptively routes between fast single-path and parallel
    exploration, and Correcting performs root-cause localization for recovery. Online self-calibration aligns decision boundaries
    without ground-truth labels. Achieves highest accuracy on six benchmarks while reducing cost by 40-56%.'
  importance: Addresses the critical problem of error accumulation in multi-step agent workflows with a principled uncertainty-aware
    framework that also reduces computational cost.
  tags:
  - uncertainty-estimation
  - error-recovery
  - agentic-workflows
  - cost-optimization
- title: Automating Agent Hijacking via Structural Template Injection
  authors:
  - Xinhao Deng
  - Jiaqing Wu
  - Miao Chen
  - Yue Xiao
  - Ke Xu
  url: https://arxiv.org/abs/2602.16958v1
  category: agents
  summary: Proposes Phantom, an automated agent hijacking framework exploiting chat template tokens to induce role confusion
    in LLM agents. Uses a Template Autoencoder to embed discrete templates into a continuous latent space and applies Bayesian
    optimization to find optimal adversarial vectors. Significantly outperforms existing baselines on Qwen, GPT, and Gemini,
    and identified over 70 confirmed vulnerabilities in commercial products.
  importance: Demonstrates a systematic, transferable attack surface for LLM agents that directly informs guardrail and security
    design for agent infrastructure.
  tags:
  - agent-security
  - prompt-injection
  - guardrails
- title: 'MiroFlow: Towards High-Performance and Robust Open-Source Agent Framework for General Deep Research Tasks'
  authors: []
  url: https://arxiv.org/abs/2602.22808v1
  category: agents
  summary: MiroFlow is an open-source agent framework featuring an agent graph for flexible orchestration, optional deep reasoning
    mode, and robust workflow execution for stable performance. It achieves state-of-the-art results across multiple agent
    benchmarks including GAIA, BrowseComp, HLE, and FutureX. The framework addresses limitations of existing agent systems
    such as naive workflows, unstable performance, and reliance on costly commercial APIs.
  importance: Provides an accessible, reproducible open-source baseline for deep research agents with strong benchmark results
    across diverse evaluation suites.
  tags:
  - agent-framework
  - orchestration
  - deep-research
  - benchmarks
- title: 'Tool-R0: Self-Evolving LLM Agents for Tool-Learning from Zero Data'
  authors: []
  url: https://arxiv.org/abs/2602.21320v1
  category: agents
  summary: 'Tool-R0 trains general-purpose tool-calling agents from scratch using self-play reinforcement learning with zero
    pre-existing data. A Generator and Solver co-evolve with complementary rewards: one proposes challenging tasks at the
    other''s competence frontier while the other learns to solve them with real tool calls. This creates a self-improving
    cycle that yields 92.5% relative improvement over the base model and surpasses supervised baselines.'
  importance: Eliminates the dependency on curated tool-use datasets by demonstrating effective self-play training for tool-calling
    agents.
  tags:
  - tool-use
  - self-play
  - reinforcement-learning
  - zero-data
- title: 'MAS-on-the-Fly: Dynamic Adaptation of LLM-based Multi-Agent Systems at Test Time'
  authors:
  - Guangyi Liu
  - Haojun Lin
  - Huan Zeng
  - Heng Wang
  - Quanming Yao
  url: https://arxiv.org/abs/2602.13671v1
  category: agents
  summary: Introduces MASFly, a framework enabling dynamic adaptation of multi-agent systems at test time through retrieval-augmented
    SOP instantiation and experience-guided supervision. Uses a self-constructed repository of successful collaboration patterns
    to assemble customized multi-agent systems for new queries. A dedicated Watcher agent monitors system behaviors and provides
    real-time interventions. Achieves 61.7% success rate on TravelPlanner, establishing state-of-the-art performance.
  importance: Demonstrates that dynamic, retrieval-driven agent orchestration at runtime significantly outperforms static
    designs, informing how agent platforms should support flexible multi-agent assembly.
  tags:
  - multi-agent
  - dynamic-orchestration
  - runtime-adaptation
- title: 'SkillJect: Automating Stealthy Skill-Based Prompt Injection for Coding Agents with Trace-Driven Closed-Loop Refinement'
  authors:
  - Xiaojun Jia
  - Jie Liao
  - Simeng Qin
  - Jindong Gu
  - Wenqi Ren
  url: https://arxiv.org/abs/2602.14211v1
  category: agents
  summary: SkillJect is the first automated framework for stealthy prompt injection targeting agent skill abstractions. It
    uses a closed-loop system of Attack, Code, and Evaluate agents to synthesize injection payloads that hide malicious operations
    in auxiliary scripts while triggering tool execution. The framework achieves high attack success rates across diverse
    coding-agent settings and real-world software engineering tasks.
  importance: Exposes a critical new attack surface in skill-based agent architectures, directly motivating guardrail and
    sandbox improvements in agent runtime systems.
  tags:
  - agent-security
  - prompt-injection
  - coding-agents
- title: 'SWE-Protégé: Learning to Selectively Collaborate With an Expert Unlocks Small Language Models as Software Engineering
    Agents'
  authors: []
  url: https://arxiv.org/abs/2602.22124v1
  category: ai-dev
  summary: SWE-Protégé is a post-training framework that enables small language models to perform software engineering tasks
    by learning to selectively consult expert models. It combines supervised fine-tuning on expert-augmented trajectories
    with agentic reinforcement learning that discourages looping and unproductive collaboration. A 7B parameter model achieves
    42.4% Pass@1 on SWE-bench Verified, a 25.4% improvement over prior SLM state of the art, using expert assistance sparingly.
  importance: Demonstrates that small, cost-efficient models can match larger models on complex SE tasks through learned expert
    collaboration, with major cost and latency benefits.
  tags:
  - swe-bench
  - small-models
  - expert-collaboration
  - reinforcement-learning
- title: 'EGSS: Entropy-guided Stepwise Scaling for Reliable Software Engineering'
  authors:
  - Chenhui Mao
  - Yuanting Lei
  - Zhixiang Wei
  - Ming Liang
  - Zhixiang Wang
  url: https://arxiv.org/abs/2602.05242v1
  category: ai-dev
  summary: Proposes Entropy-Guided Stepwise Scaling (EGSS), a test-time scaling framework that dynamically balances efficiency
    and effectiveness through entropy-guided adaptive search and test-suite augmentation for software engineering tasks. Boosts
    SWE-Bench-Verified performance by 5-10% across models, achieving 74.6% with GLM-4.6 (new open-source SOTA). Reduces inference-time
    token usage by over 28% compared to existing TTS methods.
  importance: Delivers state-of-the-art SWE-Bench results with significant efficiency gains, making agentic test-time scaling
    practical for production coding agents.
  tags:
  - test-time-scaling
  - swe-bench
  - coding-agents
  - entropy-guided
- title: 'Evaluating AGENTS.md: Are Repository-Level Context Files Helpful for Coding Agents?'
  authors:
  - Thibaud Gloaguen
  - Niels Mündler
  - Mark Müller
  - Veselin Raychev
  - Martin Vechev
  url: https://arxiv.org/abs/2602.11988v1
  category: ai-dev
  summary: Rigorously evaluates whether AGENTS.md context files actually help coding agents on real-world tasks. Finds that
    both LLM-generated and developer-written context files tend to reduce task success rates while increasing inference cost
    by over 20%. Context files encourage broader exploration and agents respect their instructions, but unnecessary requirements
    make tasks harder. Concludes that human-written context files should describe only minimal requirements.
  importance: 'Counter-intuitive finding with direct practical implications: less context is better for coding agents, challenging
    the widespread practice of providing detailed repository context files.'
  tags:
  - coding-agents
  - developer-tools
  - evaluation
  - swe-bench
- title: 'Debug2Fix: Supercharging Coding Agents with Interactive Debugging Capabilities'
  authors:
  - Spandan Garg
  - Yufan Huang
  url: https://arxiv.org/abs/2602.18571v1
  category: ai-dev
  summary: Debug2Fix introduces interactive debugging as a core capability for coding agents via a subagent architecture,
    integrating Java and Python debuggers. Evaluated on GitBug-Java and SWE-Bench-Live, it achieves over 20% improvement over
    baselines. Notably, weaker models like GPT-5 and Claude Haiku 4.5 match or exceed stronger models, demonstrating that
    better tooling can compensate for model capability gaps.
  importance: Shows that runtime debugging integration is a high-leverage improvement for coding agents, potentially more
    impactful than scaling to larger models.
  tags:
  - coding-agents
  - interactive-debugging
  - swe-bench
  - subagent-architecture
- title: 'SWE-Adept: An LLM-Based Agentic Framework for Deep Codebase Analysis and Structured Issue Resolution'
  authors:
  - Kang He
  - Kaushik Roy
  url: https://arxiv.org/abs/2603.01327v1
  category: ai-dev
  summary: SWE-Adept is a two-agent framework where a localization agent uses agent-directed depth-first search to find issue-relevant
    code, and a resolution agent implements fixes with adaptive planning. The system features shared working memory with code-state
    checkpoints indexed by execution steps, enabling Git-based version control operations like branching for alternatives
    and reverting failed edits. Outperforms prior approaches on SWE-Bench Lite and Pro by up to 4.7%.
  importance: Advances the state of the art in automated software engineering with practical innovations in codebase navigation
    and checkpoint-based issue resolution.
  tags:
  - swe-bench
  - coding-agent
