- title: 'Immersion in the GitHub Universe: Scaling Coding Agents to Mastery'
  authors: []
  url: https://arxiv.org/abs/2602.09892v2
  category: ai-dev
  summary: ScaleSWE introduces an automated multi-agent workflow to construct large-scale, high-quality software engineering
    training data from GitHub pull requests. The system coordinates three specialized agents for environment setup, test creation,
    and problem synthesis, processing 6M PRs across 5,200 repositories to produce 100k verified instances. Fine-tuning Qwen-30B
    on distilled trajectories yields a 64% resolve rate on SWE-Bench Verified, a nearly threefold improvement over the base
    model.
  importance: Largest verified SWE training dataset to date with a reproducible pipeline, significantly advancing the state
    of coding agent training data at scale.
  tags:
  - coding-agents
  - training-data
  - swe-bench
- title: 'ReflexiCoder: Teaching Large Language Models to Self-Reflect on Generated Code and Self-Correct It via Reinforcement
    Learning'
  authors:
  - Juyong Jiang
  - Jiasi Shen
  - Sunghun Kim
  - Kang Min Yoo
  - Jeonghoon Kim
  url: https://arxiv.org/abs/2603.05863v1
  category: ai-dev
  summary: ReflexiCoder proposes an RL framework that internalizes structured reasoning trajectories for code generation,
    reflection, and self-correction directly into model weights. Unlike prior methods requiring external execution feedback,
    it uses an RL-zero paradigm with granular rewards to train autonomous self-debugging. ReflexiCoder-8B achieves SOTA among
    open-source models in the 1.5B-14B range across seven benchmarks while reducing inference compute by approximately 40%.
  importance: Demonstrates that intrinsic self-correction can rival external-feedback approaches for code generation, with
    significant token efficiency gains relevant to AI-assisted development tools.
  tags:
  - code-generation
  - reinforcement-learning
  - self-correction
  - inference-efficiency
- title: 'Hybrid-Gym: Training Coding Agents to Generalize Across Tasks'
  authors:
  - Yiqing Xie
  - Emmy Liu
  - Gaokai Zhang
  - Nachiket Kotalwar
  - Shubham Gandhi
  url: https://arxiv.org/abs/2602.16819v1
  category: ai-dev
  summary: Proposes Hybrid-Gym, a training environment of scalable synthetic tasks (function localization, dependency search)
    designed to teach transferable skills to coding agents. Agents trained on synthetic tasks generalize to diverse real-world
    tasks with 25.4% absolute gain on SWE-Bench Verified, 7.9% on SWT-Bench, and 5.1% on Commit-0 Lite. The approach complements
    downstream task datasets, showing composability of training signals.
  importance: Demonstrates that synthetic skill-focused training significantly improves coding agent generalization, offering
    a practical recipe for building better development agents.
  tags:
  - coding-agents
  - training
  - generalization
- title: 'RepoLaunch: Automating Build&Test Pipeline of Code Repositories on ANY Language and ANY Platform'
  authors: []
  url: https://arxiv.org/abs/2603.05026v1
  category: ai-dev
  summary: RepoLaunch is the first agent capable of automatically resolving dependencies, compiling source code, and extracting
    test results for repositories across arbitrary programming languages and operating systems. It enables a fully automated
    pipeline for software engineering dataset creation where task design is the only human intervention. Several works on
    agentic benchmarking and training have already adopted RepoLaunch for automated task generation.
  importance: Removes a major bottleneck in SWE agent development by automating repository setup across any language and platform.
  tags:
  - build-automation
  - coding-agents
  - dataset-creation
  - devtools
- title: 'Building Effective AI Coding Agents for the Terminal: Scaffolding, Harness, Context Engineering, and Lessons Learned'
  authors:
  - Nghi D. Q. Bui
  url: https://arxiv.org/abs/2603.05344v2
  category: ai-dev
  summary: Presents OPENDEV, an open-source CLI coding agent with a compound AI system architecture featuring workload-specialized
    model routing, dual-agent planning/execution separation, lazy tool discovery, and adaptive context compaction. Introduces
    automated memory across sessions and event-driven system reminders to counter instruction fade-out. Provides a detailed
    blueprint for building terminal-first autonomous coding assistants.
  importance: Offers a comprehensive, open-source reference architecture for coding agents with practical solutions to context
    management and multi-session memory.
  tags:
  - coding-agents
  - context-engineering
  - cli-tools
  - agent-architecture
- title: 'AIDev: Studying AI Coding Agents on GitHub'
  authors:
  - Hao Li
  - Haoxiang Zhang
  - Ahmed E. Hassan
  url: https://arxiv.org/abs/2602.09185v1
  category: ai-dev
  summary: Introduces AIDev, a large-scale dataset of 932,791 agent-authored pull requests from five major coding agents (Codex,
    Devin, Copilot, Cursor, Claude Code) across 116,211 GitHub repositories. Includes a curated subset of 33,596 PRs from
    2,807 popular repositories with comments, reviews, commits, and issues. Provides an empirical foundation for studying
    AI adoption and human-AI collaboration in software engineering.
  importance: First comprehensive dataset capturing real-world coding agent usage at scale, enabling empirical research on
    how AI agents are actually transforming software development practices.
  tags:
  - coding-agents
  - dataset
  - software-engineering
  - developer-productivity
- title: Rethinking the Value of Agent-Generated Tests for LLM-Based Software Engineering Agents
  authors: []
  url: https://arxiv.org/abs/2602.07900v1
  category: ai-dev
  summary: This empirical study analyzes whether agent-written tests meaningfully improve issue resolution across six state-of-the-art
    LLMs on SWE-bench Verified. The authors find that resolved and unresolved tasks show similar test-writing frequencies,
    and agents prefer print-based observation over formal assertions. Controlled experiments modifying test-writing volume
    show no significant change in outcomes, suggesting current test-writing practices provide marginal utility in autonomous
    SE tasks.
  importance: Challenges a widely adopted practice in coding agents with rigorous empirical evidence, offering actionable
    guidance for agent workflow design.
  tags:
  - coding-agents
  - swe-bench
  - empirical-study
- title: 'SGAgent: Suggestion-Guided LLM-Based Multi-Agent Framework for Repository-Level Software Repair'
  authors:
  - Quanjun Zhang
  - Chengyu Gao
  - Yu Han
  - Ye Shang
  - Chunrong Fang
  url: https://arxiv.org/abs/2602.23647v1
  category: ai-dev
  summary: SGAgent introduces a localize-suggest-fix paradigm for repository-level bug repair, adding a suggestion phase between
    localization and patching. It builds a knowledge graph from the target repository and uses KG-based tools for global contextual
    awareness. With Claude-3.5, SGAgent achieves 51.3% on SWE-Bench at $1.48 per instance, outperforming baselines on the
    same model, and generalizes to vulnerability repair tasks.
  importance: The suggestion phase closes a reasoning gap in automated repair, and the KG-based approach offers a practical
    template for repository-aware coding agents.
  tags:
  - swe-bench
  - code-repair
  - knowledge-graph
  - multi-agent
- title: 'TraceCoder: A Trace-Driven Multi-Agent Framework for Automated Debugging of LLM-Generated Code'
  authors: []
  url: https://arxiv.org/abs/2602.06875v1
  category: ai-dev
  summary: Presents TraceCoder, a multi-agent debugging framework that emulates human expert observe-analyze-repair workflows.
    It instruments code with diagnostic probes for runtime trace capture, performs causal analysis for root cause identification,
    and uses a Historical Lesson Learning Mechanism to avoid repeating failed repairs. Achieves up to 34.43% relative improvement
    in Pass@1 over baselines, with the iterative repair process alone contributing 65.61% relative accuracy gains.
  importance: Demonstrates a practical multi-agent approach to automated code debugging with strong empirical results, relevant
    to AI-assisted development tool chains.
  tags:
  - automated-debugging
  - multi-agent
  - code-generation
  - iterative-repair
- title: 'Configuring Agentic AI Coding Tools: An Exploratory Study'
  authors:
  - Matthias Galster
  - Seyedmoein Mohsenimofidi
  - Jai Lal Lulla
  - Muhammad Auwal Abubakar
  - Christoph Treude
  url: https://arxiv.org/abs/2602.14690v1
  category: ai-dev
  summary: A systematic analysis of configuration mechanisms across five agentic coding tools (Claude Code, Copilot, Cursor,
    Gemini, Codex) covering 2,926 GitHub repositories. The study identifies eight configuration mechanisms and finds that
    Context Files dominate, with AGENTS.md emerging as an interoperable standard. Advanced mechanisms like Skills and Subagents
    see shallow adoption, relying mostly on static instructions rather than executable workflows.
  importance: Provides the first empirical baseline for how developers configure agentic coding tools, revealing practical
    patterns and gaps in current adoption.
  tags:
  - agentic-tools
  - developer-experience
  - configuration
- title: 'When AI Teammates Meet Code Review: Collaboration Signals Shaping the Integration of Agent-Authored Pull Requests'
  authors:
  - Costain Nachuma
  - Minhaz Zibran
  url: https://arxiv.org/abs/2602.19441v1
  category: ai-dev
  summary: Large empirical study analyzing how agent-authored pull requests integrate into human-driven code review workflows
    using the AIDev dataset. Finds that reviewer engagement is the strongest predictor of successful merging, while large
    change sizes and force pushes reduce merge likelihood. Qualitative analysis shows successful integration occurs when agents
    engage in actionable review loops converging toward reviewer expectations.
  importance: Provides first large-scale evidence on what makes coding agent PRs succeed, directly informing how teams should
    configure and deploy autonomous coding agents.
  tags:
  - coding-agents
  - code-review
  - software-engineering
- title: The Limits of Long-Context Reasoning in Automated Bug Fixing
  authors:
  - Ravi Raju
  - Mengmeng Ji
  - Shubhangi Upasani
  - Bo Li
  - Urmish Thakker
  url: https://arxiv.org/abs/2602.16069v2
  category: ai-dev
  summary: This work systematically evaluates whether LLMs can perform long-context code debugging. Using SWE-bench Verified,
    it shows agentic workflows succeed primarily through task decomposition into short-context steps (under 20-30k tokens),
    not long-context reasoning. Single-shot patch generation at 64k tokens fails dramatically, with Qwen3-Coder achieving
    only 7% and GPT-5-nano solving none. Failure modes include hallucinated diffs and malformed patches.
  importance: Reveals a critical gap between nominal and usable context length in LLMs, with direct implications for how coding
    agents should structure their context management.
  tags:
  - long-context
  - swe-bench
  - code-debugging
  - context-management
- title: 'CodeTaste: Can LLMs Generate Human-Level Code Refactorings?'
  authors:
  - Alex Thillen
  - Niels Mündler
  - Veselin Raychev
  - Martin Vechev
  url: https://arxiv.org/abs/2603.04177v1
  category: ai-dev
  summary: CodeTaste introduces a benchmark for evaluating LLM agents on code refactoring tasks mined from real open-source
    repositories. The benchmark combines test suites with static checks using dataflow reasoning to verify behavior-preserving
    transformations. Results show agents perform well with detailed specifications but struggle to discover human-preferred
    refactoring choices independently. A propose-then-implement decomposition improves alignment with human decisions.
  importance: Addresses a critical gap in coding agent evaluation by focusing on code quality rather than just correctness,
    providing a preference signal for aligning agents with human refactoring practices.
  tags:
  - code-refactoring
  - benchmark
  - coding-agents
- title: 'SVRepair: Structured Visual Reasoning for Automated Program Repair'
  authors: []
  url: https://arxiv.org/abs/2602.06090v1
  category: ai-dev
  summary: SVRepair introduces a multimodal automated program repair framework that transforms heterogeneous visual artifacts
    (screenshots, control-flow graphs) into semantic scene graphs capturing GUI elements and structural relations. A coding
    agent then localizes faults and synthesizes patches using these structured representations. An iterative visual-artifact
    segmentation strategy progressively narrows input to bug-centered regions. It achieves 36.47% on SWE-Bench M, 38.02% on
    MMCode, and 95.12% on CodeVision.
  importance: Pioneers multimodal program repair by bridging visual bug reports and code fixes through structured visual representations,
    advancing the state of the art on major benchmarks.
  tags:
  - program-repair
  - multimodal
  - swe-bench
  - visual-reasoning
- title: A Multi-Agent Framework for Code-Guided, Modular, and Verifiable Automated Machine Learning
  authors:
  - Dat Le
  - Duc-Cuong Le
  - Anh-Son Nguyen
  - Tuan-Dung Bui
  - Thu-Trang Nguyen
  url: https://arxiv.org/abs/2602.13937v1
  category: ai-dev
  summary: iML is a multi-agent AutoML framework that shifts from black-box prompting to code-guided, modular, and verifiable
    design. It uses code-guided planning with empirical profiling, modular implementation with interface contracts, and dynamic
    contract verification. Achieves 85% valid submission rate and 45% medal rate on MLE-BENCH, outperforming state-of-the-art
    agents by 38-163% on iML-BENCH.
  importance: Demonstrates that structured code-guided approaches with verification significantly improve reliability of AI-driven
    ML pipeline generation.
  tags:
  - automl
  - code-generation
  - multi-agent
  - verifiable-ai
- title: 'SkillsBench: Benchmarking How Well Agent Skills Work Across Diverse Tasks'
  authors:
  - Xiangyi Li
  - Wenbo Chen
  - Yimin Liu
  - Shenghan Zheng
  - Xiaokun Chen
  url: https://arxiv.org/abs/2602.12670v2
  category: harnesses
  summary: SkillsBench benchmarks 86 tasks across 11 domains to evaluate whether structured procedural knowledge (Skills)
    actually helps LLM agents. Curated Skills raise pass rates by 16.2pp on average but effects vary widely by domain, and
    16 of 84 tasks show negative deltas. Self-generated Skills provide no benefit, showing models cannot reliably author procedural
    knowledge they benefit from consuming. Focused Skills with 2-3 modules outperform comprehensive documentation.
  importance: Provides empirical evidence on how to structure agent procedural knowledge effectively, directly informing skill/tool
    design patterns for agent platforms.
  tags:
  - agent-skills
  - benchmark
  - procedural-knowledge
  - tool-design
- title: 'AMA-Bench: Evaluating Long-Horizon Memory for Agentic Applications'
  authors: []
  url: https://arxiv.org/abs/2602.22769v2
  category: harnesses
  summary: AMA-Bench evaluates long-horizon memory for LLMs in real agentic applications, featuring both real-world and synthetic
    agentic trajectories at arbitrary horizons. It exposes limitations of existing memory systems that rely on lossy similarity-based
    retrieval and lack causal reasoning. The authors propose AMA-Agent, a memory system with a causality graph and tool-augmented
    retrieval that achieves 57.22% accuracy, surpassing baselines by 11.16%.
  importance: Fills a critical evaluation gap for agent memory systems by focusing on real agent-environment interactions
    rather than dialogue-centric benchmarks.
  tags:
  - agent-memory
  - benchmark
  - retrieval
  - long-horizon
- title: An Empirical Study of Bugs in Modern LLM Agent Frameworks
  authors:
  - Xinxue Zhu
  - Jiacong Wu
  - Xiaoyu Zhang
  - Tianlin Li
  - Yanzhou Mu
  url: https://arxiv.org/abs/2602.21806v3
  category: harnesses
  summary: This empirical study analyzes 998 bug reports from CrewAI and LangChain, constructing a taxonomy of 15 root causes
    and 7 symptoms across five agent lifecycle stages. Key findings show that bugs mainly arise from API misuse, API incompatibility,
    and documentation desync, concentrated in the Self-Action stage. Symptoms typically manifest as functional errors, crashes,
    and build failures disrupting task progression.
  importance: Provides actionable taxonomy of framework-level bugs that agent platform developers should anticipate and guard
    against in their SDK and runtime designs.
  tags:
  - agent-frameworks
  - bug-taxonomy
  - langchain
  - crewai
- title: 'MemoryArena: Benchmarking Agent Memory in Interdependent Multi-Session Agentic Tasks'
  authors: []
  url: https://arxiv.org/abs/2602.16313v1
  category: harnesses
  summary: MemoryArena is a benchmark for evaluating agent memory in multi-session Memory-Agent-Environment loops with explicitly
    interdependent subtasks. Agents must learn from earlier actions and feedback, distill experiences into memory, and use
    that memory to guide later actions. It covers web navigation, preference-constrained planning, progressive search, and
    sequential formal reasoning. Results show agents with near-saturated performance on existing memory benchmarks perform
    poorly in this agentic setting.
  importance: Exposes a critical gap in memory evaluation by testing coupled memorization-action loops rather than isolated
    recall or single-session tasks.
  tags:
  - agent-memory
  - benchmark
  - multi-session
  - evaluation
- title: 'Authenticated Workflows: A Systems Approach to Protecting Agentic AI'
  authors:
  - Mohan Rajagopalan
  - Vinay Rao
  url: https://arxiv.org/abs/2602.10465v1
  category: harnesses
  summary: 'Introduces authenticated workflows as a trust layer for enterprise agentic AI, protecting four boundaries: prompts,
    tools, data, and context with cryptographic enforcement. Proposes MAPL, an AI-native policy language, and demonstrates
    a universal security runtime integrating nine frameworks (MCP, A2A, LangChain, CrewAI, etc.). Achieves 100% recall with
    zero false positives across 174 test cases and mitigates 9 of 10 OWASP Top 10 risks.'
  importance: First comprehensive deterministic security layer for agentic AI that works across major frameworks, addressing
    a critical enterprise deployment gap.
  tags:
  - agent-security
  - guardrails
  - enterprise-ai
  - cryptographic-trust
- title: 'AgentLAB: Benchmarking LLM Agents against Long-Horizon Attacks'
  authors:
  - Tanqiu Jiang
  - Yuhui Wang
  - Jiacheng Liang
  - Ting Wang
  url: https://arxiv.org/abs/2602.16901v1
  category: harnesses
  summary: Presents AgentLAB, the first benchmark for evaluating LLM agent susceptibility to adaptive long-horizon attacks
    including intent hijacking, tool chaining, task injection, objective drifting, and memory poisoning across 28 environments
    and 644 test cases. Finds that agents remain highly susceptible to multi-turn attacks, and defenses designed for single-turn
    interactions fail to mitigate long-horizon threats.
  importance: First systematic benchmark for multi-turn agent security, essential for building robust guardrails and session
    management in production agent systems.
  tags:
  - agent-security
  - benchmarks
  - multi-turn-attacks
- title: 'AgentSelect: Benchmark for Narrative Query-to-Agent Recommendation'
  authors: []
  url: https://arxiv.org/abs/2603.03761v1
  category: harnesses
  summary: AgentSelect reframes agent selection as query-to-agent recommendation, providing a benchmark of 111K queries, 107K
    deployable agents, and 251K interaction records from 40+ sources. It reveals a regime shift from dense reuse to long-tail
    supervision where popularity-based methods fail and content-aware capability matching becomes essential. Models trained
    on AgentSelect transfer to unseen agent marketplaces, demonstrating practical agent recommendation capability.
  importance: First unified benchmark for agent recommendation, directly applicable to agent marketplace and orchestration
    platform design.
  tags:
  - agent-selection
  - benchmark
  - recommendation
  - orchestration
- title: Evolutionary Generation of Multi-Agent Systems
  authors:
  - Yuntong Hu
  - Matthew Trager
  - Yuting Zhang
  - Yi Zhang
  - Shuo Yang
  url: https://arxiv.org/abs/2602.06511v2
  category: harnesses
  summary: EvoMAS formulates multi-agent system generation as structured configuration generation with evolutionary optimization.
    It selects initial configurations, applies feedback-conditioned mutation and crossover guided by execution traces, and
    iteratively refines candidates. Evaluated on BBEH, SWE-Bench, and WorkBench, it outperforms human-designed MAS and prior
    automatic methods, reaching 79.1% on SWE-Bench-Verified with Claude-4.5-Sonnet.
  importance: Automates multi-agent architecture design through evolutionary search over configurations, reducing the manual
    effort of designing agent topologies.
  tags:
  - multi-agent-generation
  - evolutionary-optimization
  - swe-bench
  - auto-agent-design
- title: 'OpaqueToolsBench: Learning Nuances of Tool Behavior Through Interaction'
  authors: []
  url: https://arxiv.org/abs/2602.15197v1
  category: harnesses
  summary: 'OpaqueToolsBench is a benchmark for evaluating LLM agents on underspecified, opaque tools that lack clear documentation,
    mirroring real-world API usage. It spans three environments: function calling, chess, and agentic search. The authors
    propose ToolObserver, a framework that iteratively refines tool documentation by observing execution feedback, outperforming
    baselines while consuming 3.5-7.5x fewer tokens.'
  importance: Addresses a critical gap in tool-use evaluation by focusing on poorly documented tools, directly informing how
    agent platforms should handle tool orchestration and documentation.
  tags:
  - tool-use
  - benchmarks
  - function-calling
  - agent-evaluation
- title: 'AdaptOrch: Task-Adaptive Multi-Agent Orchestration in the Era of LLM Performance Convergence'
  authors:
  - Geunbin Yu
  url: https://arxiv.org/abs/2602.16873v1
  category: harnesses
  summary: AdaptOrch formalizes multi-agent orchestration topology selection as an optimization problem, proposing a Performance
    Convergence Scaling Law and a Topology Routing Algorithm that maps task dependency DAGs to optimal orchestration patterns
    (parallel, sequential, hierarchical, hybrid) in linear time. Validated across SWE-bench, GPQA, and RAG tasks, topology-aware
    orchestration achieves 12-23% improvement over static baselines with identical underlying models.
  importance: Establishes orchestration topology as a first-class optimization target independent of model scaling, directly
    relevant to agent framework and runtime design.
  tags:
  - orchestration
  - multi-agent
  - topology-routing
  - agent-framework
- title: 'FeatureBench: Benchmarking Agentic Coding for Complex Feature Development'
  authors:
  - Qixing Zhou
  - Jiacheng Zhang
  - Haiyang Wang
  - Rui Hao
  - Jiahe Wang
  url: https://arxiv.org/abs/2602.10975v1
  category: harnesses
  summary: Proposes FeatureBench, a benchmark for evaluating coding agents on end-to-end feature development spanning multiple
    commits and PRs, using execution-based evaluation with automated task derivation from dependency graphs. Curates 200 tasks
    and 3825 executable environments from 24 open-source repositories. Shows that Claude 4.5 Opus, which achieves 74.4% on
    SWE-bench, succeeds on only 11.0% of FeatureBench tasks. Provides an automated toolkit for scaling and updating the benchmark
    to mitigate data leakage.
  importance: Exposes a major capability gap in current coding agents for real-world feature development, providing a much
    harder and more representative benchmark than SWE-bench.
  tags:
  - coding-agents
  - benchmarking
  - feature-development
  - swe-bench
- title: 'Agent-Diff: Benchmarking LLM Agents on Enterprise API Tasks via Code Execution with State-Diff-Based Evaluation'
  authors:
  - Hubert M. Pysklo
  - Artem Zhuravel
  - Patrick D. Watson
  url: https://arxiv.org/abs/2602.11224v1
  category: harnesses
  summary: Presents Agent-Diff, a benchmarking framework for evaluating agentic LLMs on real-world enterprise API tasks using
    a novel state-diff contract that defines success by whether expected environment state changes were achieved rather than
    trace matching. Provides a sandboxed scripting layer for executing code against real external APIs including Slack, Box,
    Linear, and Google Calendar. Benchmarks nine LLMs across 224 enterprise workflow tasks with ablation experiments on API
    documentation access.
  importance: Introduces a principled outcome-based evaluation method for enterprise agent tasks that balances ecological
    validity with reproducibility, directly relevant to tool orchestration platforms.
  tags:
  - enterprise-agents
  - evaluation
  - api-orchestration
  - benchmarking
- title: 'LOGIGEN: Logic-Driven Generation of Verifiable Agentic Tasks'
  authors: []
  url: https://arxiv.org/abs/2603.00540v1
  category: harnesses
  summary: Introduces LOGIGEN, a logic-driven framework for synthesizing verifiable agent training data using hard-compiled
    policy grounding, forward synthesis, and deterministic state verification. Employs a Triple-Agent Orchestration of Architect,
    Set Designer, and Explorer to generate 20K complex tasks across 8 domains. Combined SFT and RL training yields 79.5% success
    rate on tau2-Bench, nearly doubling the base model's 40.7%.
  importance: Provides a principled approach to generating verifiable agent training data, addressing the critical data scarcity
    bottleneck for training reliable autonomous agents.
  tags:
  - agent-training
  - verification
  - data-synthesis
  - orchestration
- title: 'Agent Skills for Large Language Models: Architecture, Acquisition, Security, and the Path Forward'
  authors:
  - Renjun Xu
  - Yang Yan
  url: https://arxiv.org/abs/2602.12430v3
  category: harnesses
  summary: 'This survey comprehensively covers the emerging agent skills landscape, organizing it along four axes: architectural
    foundations (SKILL.md, MCP integration), skill acquisition (RL, autonomous discovery, compositional synthesis), deployment
    at scale (CUA stack, GUI grounding), and security (26.1% of community skills contain vulnerabilities). It proposes a Skill
    Trust and Lifecycle Governance Framework with a four-tier permission model.'
  importance: Provides the first systematic treatment of the skill abstraction layer for agents, with practical security governance
    frameworks directly applicable to agent runtime platforms.
  tags:
  - agent-skills
  - mcp
  - security
  - survey
- title: '$\tau$-Knowledge: Evaluating Conversational Agents over Unstructured Knowledge'
  authors: []
  url: https://arxiv.org/abs/2603.04370v1
  category: harnesses
  summary: tau-Knowledge extends tau-Bench to evaluate agents in knowledge-intensive settings requiring coordination of unstructured
    document retrieval with tool-mediated actions. The new tau-Banking domain models fintech customer support with ~700 interconnected
    knowledge documents. Even frontier models with high reasoning budgets achieve only ~25.5% pass@1, with reliability degrading
    sharply over repeated trials, highlighting challenges in retrieval from dense knowledge bases and policy reasoning.
  importance: Provides a realistic, end-to-end benchmark for knowledge-grounded agentic workflows that exposes critical gaps
    in current agent capabilities.
  tags:
  - benchmarks
  - knowledge-retrieval
  - tool-use
- title: 'AgenticRAGTracer: A Hop-Aware Benchmark for Diagnosing Multi-Step Retrieval Reasoning in Agentic RAG'
  authors:
  - Qijie You
  - Wenkai Yu
  - Wentao Zhang
  url: https://arxiv.org/abs/2602.19127v1
  category: harnesses
  summary: Introduces the first agentic RAG benchmark with automatic hop-level annotation for step-by-step validation of multi-hop
    reasoning. The benchmark spans multiple domains with 1,305 data points and reveals that even GPT-5 achieves only 22.6%
    EM accuracy on the hardest portion. Hop-aware diagnosis shows failures are driven by distorted reasoning chains that either
    collapse prematurely or wander into over-extension.
  importance: Fills a critical evaluation gap for agentic RAG systems by enabling fine-grained diagnosis of where multi-step
    retrieval reasoning fails.
  tags:
  - agentic-rag
  - benchmarks
  - multi-hop-reasoning
- title: 'SWE-CI: Evaluating Agent Capabilities in Maintaining Codebases via Continuous Integration'
  authors: []
  url: https://arxiv.org/abs/2603.03823v1
  category: harnesses
  summary: SWE-CI is the first repository-level benchmark built on the Continuous Integration loop, shifting evaluation from
    static one-shot bug fixing to dynamic, long-term code maintainability. Each of its 100 tasks spans an average evolution
    history of 233 days and 71 consecutive commits in real-world repositories. Agents must resolve tasks through dozens of
    analysis and coding iterations, testing their ability to sustain code quality through long-term evolution.
  importance: Fills a critical gap in coding agent evaluation by testing long-term maintainability rather than one-shot fixes,
    better reflecting real-world development.
  tags:
  - benchmarks
  - coding-agents
  - continuous-integration
- title: 'Turn: A Language for Agentic Computation'
  authors: []
  url: https://arxiv.org/abs/2603.08755v1
  category: harnesses
  summary: Presents Turn, a compiled actor-based programming language designed for agentic software. Features cognitive type
    safety (LLM inference as a typed primitive with JSON Schema validation), a confidence operator for deterministic control
    flow, actor-based process model with isolated context windows and persistent memory, and capability-based credential isolation.
    Compile-time schema absorption synthesizes typed API bindings from OpenAPI, GraphQL, FHIR, and MCP specifications.
  importance: Proposes language-level guarantees for agent invariants like typed inference output, credential isolation, and
    durable state, addressing fundamental agent infrastructure concerns.
  tags:
  - programming-language
  - agent-infrastructure
  - type-safety
  - actor-model
- title: 'AD-Bench: A Real-World, Trajectory-Aware Advertising Analytics Benchmark for LLM Agents'
  authors:
  - Lingxiang Hu
  - Yiding Sun
  - Tianle Xia
  - Wenwei Li
  - Ming Xu
  url: https://arxiv.org/abs/2602.14257v1
  category: harnesses
  summary: AD-Bench evaluates LLM agents on real advertising and marketing analytics tasks requiring multi-round interaction
    with professional marketing tools. Built from real user requests with expert-verified answers and reference tool-call
    trajectories, it categorizes tasks into three difficulty levels. Even Gemini-3-Pro drops from 68% to 49.4% Pass@1 on the
    hardest level with only 70.1% trajectory coverage.
  importance: Provides a realistic multi-tool agent benchmark with trajectory evaluation, useful for measuring agent tool
    orchestration quality in complex domains.
  tags:
  - benchmark
  - tool-calling
  - multi-round
  - advertising
- title: 'MC-Search: Evaluating and Enhancing Multimodal Agentic Search with Structured Long Reasoning Chains'
  authors: []
  url: https://arxiv.org/abs/2603.00873v1
  category: harnesses
  summary: MC-Search is the first benchmark for agentic multimodal RAG with long, step-wise annotated reasoning chains spanning
    five reasoning structures. It introduces process-level metrics for reasoning quality and stepwise retrieval accuracy,
    and reveals systematic issues like over-retrieval and modality-misaligned planning in six leading MLLMs. The companion
    Search-Align framework uses process-supervised fine-tuning on verified reasoning chains to improve planning and retrieval
    fidelity.
  importance: Provides a rigorous evaluation framework for agentic retrieval systems, informing how tool orchestration and
    planning should be benchmarked in agent platforms.
  tags:
  - benchmarks
  - multimodal-rag
  - agentic-search
  - reasoning
- title: 'IDP Accelerator: Agentic Document Intelligence from Extraction to Compliance Validation'
  authors: []
  url: https://arxiv.org/abs/2602.23481v1
  category: applications
  summary: IDP Accelerator is a production-grade framework for end-to-end document intelligence featuring document packet
    segmentation, configurable multimodal LLM extraction, an agentic analytics module compliant with Model Context Protocol
    (MCP), and LLM-driven rule validation for compliance checks. Deployed at a healthcare provider, it achieves 98% classification
    accuracy with 80% reduced latency and 77% lower costs. The system is open-sourced with MCP tool integration and sandboxed
    code execution.
  importance: Demonstrates a production-validated agentic document processing pipeline with MCP compliance, directly relevant
    to building agent-based enterprise workflows.
  tags:
  - document-processing
  - MCP
  - agentic-workflows
  - enterprise
- title: 'Mozi: Governed Autonomy for Drug Discovery LLM Agents'
  authors:
  - He Cao
  - Siyu Liu
  - Fan Zhang
  - Zijing Liu
  - Hao Li
  url: https://arxiv.org/abs/2603.03655v1
  category: applications
  summary: 'Mozi introduces a dual-layer architecture for drug discovery agents: a Control Plane enforcing role-based tool
    isolation and reflection-based replanning, and a Workflow Plane implementing canonical drug discovery stages as stateful,
    composable skill graphs with human-in-the-loop checkpoints. The design principle of free-form reasoning for safe tasks
    and structured execution for long-horizon pipelines provides trace-level auditability. Evaluation on PharmaBench shows
    superior orchestration accuracy.'
  importance: Demonstrates governed agent autonomy patterns with guardrails, tool isolation, and auditability that generalize
    beyond drug discovery to any high-stakes agent deployment.
  tags:
  - governed-autonomy
  - drug-discovery
  - guardrails
  - workflow-orchestration
- title: 'Beyond Rows to Reasoning: Agentic Retrieval for Multimodal Spreadsheet Understanding and Editing'
  authors: []
  url: https://arxiv.org/abs/2603.06503v1
  category: applications
  summary: Introduces BRTR, a multimodal agentic framework for spreadsheet understanding that replaces single-pass retrieval
    with an iterative tool-calling loop supporting end-to-end Excel workflows. Achieves state-of-the-art across three benchmarks,
    surpassing prior methods by 7-32 percentage points. Evaluates five embedding models and nine LLMs, with ablations confirming
    that planner, retrieval, and iterative reasoning each contribute substantially.
  importance: Demonstrates how iterative agentic retrieval with tool-call traces enables complex enterprise document understanding,
    a practical pattern for production agent systems.
  tags:
  - spreadsheet-ai
  - agentic-rag
  - multimodal
  - enterprise
- title: 'OptiRepair: Closed-Loop Diagnosis and Repair of Supply Chain Optimization Models with LLM Agents'
  authors: []
  url: https://arxiv.org/abs/2602.19439v2
  category: applications
  summary: 'OptiRepair decomposes supply chain model repair into domain-agnostic feasibility restoration (IIS-guided diagnosis)
    and domain-specific validation (five rationality checks from inventory theory). Testing 22 API models and two trained
    8B models on 976 multi-echelon problems, trained models achieve 81.7% Rational Recovery Rate vs 42.2% for the best API
    model. The work identifies two critical gaps: solver interaction (27.6% vs 97.2% recovery) and operational rationale enforcement.'
  importance: Demonstrates effective agentic tool-use with solver feedback loops, providing a template for domain-specific
    agent validation in enterprise optimization.
  tags:
  - supply-chain
  - tool-use
  - optimization
  - domain-agents
- title: 'CT-Flow: Orchestrating CT Interpretation Workflow with Model Context Protocol Servers'
  authors: []
  url: https://arxiv.org/abs/2603.00123v1
  category: applications
  summary: CT-Flow is an agentic framework for volumetric CT interpretation that uses the Model Context Protocol (MCP) to
    shift from closed-box inference to an open, tool-aware paradigm. The system decomposes complex clinical queries into automated
    tool-use sequences for measurement, radiomics, and segmentation. It surpasses baselines by 41% in diagnostic accuracy
    and achieves 95% tool invocation success on the newly curated CT-FlowBench benchmark.
  importance: Demonstrates MCP-based tool orchestration for clinical workflows, showing how agentic architectures can coordinate
    specialized tools in safety-critical domains.
  tags:
  - mcp
  - medical-ai
  - tool-orchestration
  - clinical-workflows
- title: An end-to-end agentic pipeline for smart contract translation and quality evaluation
  authors:
  - Abhinav Goel
  - Chaitya Shah
  - Agostino Capponi
  - Alfio Gliozzo
  url: https://arxiv.org/abs/2602.13808v1
  category: applications
  summary: This framework systematically evaluates LLM-generated smart contracts from natural-language specifications using
    CrewAI-style agent teams with iterative refinement. It parses contractual text into structured schemas, generates Solidity
    code, and performs automated quality assessment through compilation and security checks. Quality is measured across five
    dimensions aggregated into composite scores with full provenance metadata.
  importance: Demonstrates a practical multi-agent pipeline pattern with iterative refinement and provenance tracking applicable
    to code generation agent systems.
  tags:
  - smart-contracts
  - code-generation
  - multi-agent
  - quality-evaluation
- title: 'LiaisonAgent: An Multi-Agent Framework for Autonomous Risk Investigation and Governance'
  authors:
  - Chuanming Tang
  - Ling Qing
  - Shifeng Chen
  url: https://arxiv.org/abs/2603.00200v1
  category: applications
  summary: LiaisonAgent is an autonomous multi-agent system for SOC operations that bridges technical risk detection and business-level
    governance. Built on QWQ-32B, it uses specialized sub-agents with a hybrid planning architecture combining deterministic
    workflows and ReAct-based autonomous reasoning. It achieves 97.8% tool-calling success rate, 95% risk judgment accuracy,
    and 92.7% reduction in manual investigation overhead.
  importance: Shows strong practical results for autonomous security operations with hybrid deterministic-agentic planning,
    a pattern applicable to many production agent deployments.
  tags:
  - security-operations
  - multi-agent
  - hybrid-planning
  - tool-calling
- title: Agentic AI for Scalable and Robust Optical Systems Control
  authors: []
  url: https://arxiv.org/abs/2602.20144v1
  category: applications
  summary: AgentOptics is an agentic AI framework for autonomous optical system control built on the Model Context Protocol.
    It implements 64 standardized MCP tools across 8 optical devices and a 410-task benchmark. Two deployment configurations
    (cloud LLMs and local open-source LLMs) achieve 87.7-99% task success rates, significantly outperforming code-generation
    baselines at 50%. Five case studies demonstrate system-level orchestration and closed-loop optimization.
  importance: Showcases MCP-based tool orchestration at scale in a real industrial domain, providing a blueprint for standardized
    agent-device interaction.
  tags:
  - mcp
  - tool-orchestration
  - industrial-ai
  - optical-systems
- title: 'Decoding ML Decision: An Agentic Reasoning Framework for Large-Scale Ranking System'
  authors:
  - Longfei Yun
  - Yihan Wu
  - Haoran Liu
  - Xiaoxuan Liu
  - Ziyun Xu
  url: https://arxiv.org/abs/2602.18640v1
  category: applications
  summary: Presents GEARS, a framework that reframes ranking optimization as an autonomous discovery process using Specialized
    Agent Skills to encapsulate expert knowledge into reusable reasoning capabilities. Operators steer systems via high-level
    intent rather than manual hypothesis engineering. Validation hooks enforce statistical robustness and filter brittle policies.
    Demonstrates near-Pareto-efficient policy discovery across diverse product surfaces.
  importance: Shows how agentic frameworks can automate complex ML system optimization, relevant to teams managing large-scale
    production ranking systems.
  tags:
  - ranking-systems
  - agentic-optimization
  - ml-operations
- title: 'Beyond End-to-End Video Models: An LLM-Based Multi-Agent System for Educational Video Generation'
  authors:
  - Lingyong Yan
  - Jiulong Wu
  - Dong Xie
  - Weixian Shi
  - Deguo Xia
  url: https://arxiv.org/abs/2602.11790v1
  category: applications
  summary: LAVES is a hierarchical multi-agent system for generating educational videos from problems, decomposing generation
    into specialized agents coordinated by a central Orchestrating Agent with quality gates and iterative critique. It includes
    Solution, Illustration, and Narration agents with semantic critique and tool-based compilation checks. In production deployment,
    it achieves 1M+ videos/day throughput with 95% cost reduction over industry approaches.
  importance: Demonstrates a production-scale multi-agent orchestration pattern with quality gates and iterative refinement,
    showcasing practical agent workflow design at impressive scale.
  tags:
  - multi-agent
  - video-generation
  - orchestration
  - production-scale
- title: 'Cast-R1: Learning Tool-Augmented Sequential Decision Policies for Time Series Forecasting'
  authors: []
  url: https://arxiv.org/abs/2602.13802v1
  category: applications
  summary: Cast-R1 reformulates time series forecasting as a sequential decision-making problem with a memory-based state
    management mechanism and tool-augmented agentic workflow. The agent autonomously interacts with a modular toolkit to extract
    features, invoke forecasting models, perform reasoning, and iteratively refine predictions through self-reflection. Training
    combines supervised fine-tuning with multi-turn reinforcement learning and curriculum learning for progressive difficulty
    scaling.
  importance: Demonstrates the agentic paradigm's effectiveness for time series modeling, showing tool-augmented iterative
    reasoning can outperform single-pass approaches.
  tags:
  - time-series
  - tool-augmented
  - sequential-decisions
  - forecasting
- title: Autonomous Edge-Deployed AI Agents for Electric Vehicle Charging Infrastructure Management
  authors: []
  url: https://arxiv.org/abs/2603.08736v1
  category: applications
  summary: Auralink SDC deploys domain-specialized AI agents at the network edge for autonomous EV charging infrastructure
    management. Key innovations include Confidence-Calibrated Autonomous Resolution with formal false-positive bounds, Adaptive
    Retrieval-Augmented Reasoning, an edge runtime achieving sub-50ms TTFT, and Hierarchical Multi-Agent Orchestration. Evaluation
    on 18K labeled incidents shows 78% autonomous resolution rate and 87.6% diagnostic accuracy.
  importance: Demonstrates a full production architecture for edge-deployed multi-agent systems with safety-critical constraints,
    offering reusable patterns for agent orchestration.
  tags:
  - edge-deployment
  - multi-agent
  - orchestration
  - autonomous-agents
- title: 'AnomaMind: Agentic Time Series Anomaly Detection with Tool-Augmented Reasoning'
  authors: []
  url: https://arxiv.org/abs/2602.13807v1
  category: applications
  summary: Reformulates time series anomaly detection as a sequential decision-making process using an agentic framework.
    Operates through coarse-to-fine localization, multi-turn tool interactions for adaptive feature preparation, and self-reflection
    for decision refinement. Uses a hybrid inference mechanism where general-purpose models handle tool interaction while
    core detection is learned via reinforcement learning with workflow-level feedback.
  importance: Demonstrates how agentic tool-augmented reasoning can improve observability and anomaly detection, relevant
    to monitoring infrastructure.
  tags:
  - anomaly-detection
  - tool-augmented
  - observability
- title: 'GroupGPT: A Token-efficient and Privacy-preserving Agentic Framework for Multi-User Chat Assistant'
  authors: []
  url: https://arxiv.org/abs/2603.01059v1
  category: applications
  summary: GroupGPT proposes a token-efficient agentic framework for multi-user group chat assistants using a small-large
    model collaborative architecture that decouples intervention timing from response generation. The framework supports multimodal
    inputs and provides privacy sanitization before cloud transmission. It introduces MUIR, a benchmark of 2,500 annotated
    group chat segments. GroupGPT achieves 4.72/5.0 evaluation scores while reducing token usage by 3x.
  importance: Addresses the under-explored multi-user agent deployment scenario with practical solutions for token efficiency,
    privacy preservation, and intervention timing.
  tags:
  - multi-user
  - privacy
  - token-efficiency
  - chat-agents
- title: 'Catalyst-Agent: Autonomous heterogeneous catalyst screening and optimization with an LLM Agent'
  authors: []
  url: https://arxiv.org/abs/2603.01311v1
  category: applications
  summary: Introduces Catalyst-Agent, an MCP server-based LLM agent for autonomous catalyst discovery that explores material
    databases, makes structural modifications, and calculates adsorption energies using GNN models in a closed-loop manner.
    Tested on three pivotal reactions (ORR, NRR, CO2RR), achieving 23-34% success rates among evaluated materials with convergence
    in 1-2 trials per successful material.
  importance: Notable example of MCP-based tool orchestration for scientific discovery, demonstrating the agentic pattern
    of planning, tool use, and iterative refinement.
  tags:
  - scientific-agents
  - mcp
  - tool-orchestration
  - materials-science
- title: 'MedScope: Incentivizing Think with Videos for Clinical Reasoning via Coarse-to-Fine Tool Calling'
  authors: []
  url: https://arxiv.org/abs/2602.13332v1
  category: applications
  summary: MedScope is a tool-using clinical video reasoning model that performs coarse-to-fine evidence seeking over long-form
    medical procedures. It interleaves intermediate reasoning with targeted tool calls and verification on retrieved observations,
    producing predictions grounded in temporally localized visual evidence. Trained with Grounding-Aware Group Relative Policy
    Optimization that reinforces tool use with grounding-aligned rewards, it achieves state-of-the-art on clinical video understanding
    benchmarks.
  importance: Advances medical AI by demonstrating that tool-integrated video reasoning can produce more trustworthy and evidence-grounded
    clinical predictions.
  tags:
  - medical-ai
  - video-reasoning
  - tool-use
  - clinical
- title: 'HLER: Human-in-the-Loop Economic Research via Multi-Agent Pipelines for Empirical Discovery'
  authors: []
  url: https://arxiv.org/abs/2603.07444v1
  category: applications
  summary: HLER introduces a multi-agent architecture for empirical economics research that preserves human oversight through
    embedded decision gates. The system orchestrates agents for data auditing, hypothesis generation, econometric analysis,
    manuscript drafting, and automated review within a two-loop architecture. Dataset-aware hypothesis generation produces
    feasible research questions in 87% of cases versus 41% under unconstrained generation, at $0.8-$1.5 per complete manuscript.
  importance: Demonstrates practical human-in-the-loop agent pipelines with strong feasibility improvements, applicable to
    broader research automation workflows.
  tags:
  - human-in-the-loop
  - multi-agent
  - research-automation
- title: 'CiteAudit: You Cited It, But Did You Read It? A Benchmark for Verifying Scientific References in the LLM Era'
  authors: []
  url: https://arxiv.org/abs/2602.23452v1
  category: applications
  summary: CiteAudit presents the first comprehensive benchmark and multi-agent detection framework for hallucinated citations
    in scientific writing. The verification pipeline decomposes citation checking into claim extraction, evidence retrieval,
    passage matching, reasoning, and calibrated judgment. A large-scale human-validated dataset across domains defines unified
    metrics for citation faithfulness. Experiments show substantial citation errors in state-of-the-art LLMs and demonstrate
    the framework significantly outperforms prior methods.
  importance: Addresses a critical trust problem in LLM-generated scientific text with a practical multi-agent verification
    pipeline applicable to any document processing system.
  tags:
  - citation-verification
  - hallucination-detection
  - multi-agent
  - scientific-writing
- title: 'DataJoint 2.0: A Computational Substrate for Agentic Scientific Workflows'
  authors:
  - Dimitri Yatsenko
  - Thinh T. Nguyen
  url: https://arxiv.org/abs/2602.16585v1
  category: applications
  summary: Introduces DataJoint 2.0, a relational workflow model where tables represent workflow steps, rows represent artifacts,
    and foreign keys prescribe execution order. Features object-augmented schemas, semantic matching for join safety, extensible
    type systems, and distributed job coordination. Creates a substrate for SciOps where agents can participate in scientific
    workflows with transactional guarantees and full provenance.
  importance: Provides a principled infrastructure pattern for agent-safe workflow orchestration with data integrity, relevant
    to agent orchestration in scientific and data-intensive domains.
  tags:
  - workflow-orchestration
  - scientific-computing
  - data-pipelines
- title: 'GenDB: The Next Generation of Query Processing -- Synthesized, Not Engineered'
  authors:
  - Jiale Lao
  - Immanuel Trummer
  url: https://arxiv.org/abs/2603.02081v1
  category: applications
  summary: GenDB proposes using LLMs to synthesize instance-optimized query execution code for each incoming query rather
    than relying on traditional query engines. Built as a multi-agent system using Claude Code Agent, it generates customized
    code tailored to specific data, workloads, and hardware. Evaluations on TPC-H and a new benchmark show GenDB outperforms
    DuckDB, Umbra, MonetDB, ClickHouse, and PostgreSQL.
  importance: Demonstrates a paradigm shift in database query processing where LLM agents synthesize optimized execution code,
    outperforming hand-engineered database engines.
  tags:
  - database
  - code-synthesis
  - multi-agent
